<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrera Multijugador | AprobadoYa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .game-header {
            text-align: center;
            padding: 20px 0;
        }
        .game-header h1 { font-size: 2rem; }
        .game-header h1 i { color: #fbbf24; }
        
        .race-track {
            background: linear-gradient(135deg, #2d3e2c, #1f2e1a);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(251,191,36,0.3);
        }
        .track {
            position: relative;
            height: 100px;
            background: #4a5b3e;
            border-radius: 50px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .track:last-child { margin-bottom: 0; }
        .car {
            position: absolute;
            bottom: 10px;
            left: 0%;
            font-size: 2.5rem;
            transition: left 0.3s ease;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .car.azul { left: 0%; }
        .car.rojo { left: 0%; }
        .finish-line {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 30px;
            background: repeating-linear-gradient(90deg, #000 0px, #000 10px, #fff 10px, #fff 20px);
        }
        .player-name {
            position: absolute;
            top: -25px;
            left: 10px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 2px 10px;
            border-radius: 20px;
        }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            border-radius: 25px;
            padding: 15px 25px;
            margin-bottom: 30px;
        }
        .score-item {
            text-align: center;
            flex: 1;
        }
        .score-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fbbf24;
        }
        
        .question-card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            color: #1e293b;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .options {
            display: grid;
            gap: 12px;
        }
        .option-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option-btn:hover:not(.disabled) {
            background: #fef3c7;
            border-color: #fbbf24;
            transform: translateX(8px);
        }
        .option-prefix {
            font-weight: 800;
            color: #fbbf24;
            width: 35px;
        }
        .disabled { opacity: 0.5; cursor: not-allowed; }
        .correct { background: #d1fae5; border-color: #10b981; }
        .incorrect { background: #fee2e2; border-color: #ef4444; }
        
        .waiting-message {
            text-align: center;
            padding: 40px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .turn-indicator {
            text-align: center;
            padding: 10px;
            background: #fbbf24;
            color: #1a472a;
            border-radius: 50px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .car { font-size: 2rem; bottom: 8px; }
            .track { height: 80px; }
            .question-text { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1><i class="fas fa-flag-checkered"></i> Carrera Multijugador</h1>
        </div>

        <div id="gameContent">
            <div class="waiting-message">
                <div class="spinner"></div>
                <p>Cargando partida...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, getDoc, updateDoc, onSnapshot, collection, query, where, getDocs } from '../../js/firebase-init.js';
        import { renderUserZone } from '../../js/global-auth.js';
        import { preguntasDGT } from '../../test/data/preguntas.js';
        
        let salaId = null;
        let currentUser = null;
        let salaData = null;
        let esJugador1 = false;
        let preguntaActual = null;
        let respuestaSeleccionada = false;
        let gameActivo = true;
        let unsubscribe = null;
        
        function obtenerPreguntaAleatoria() {
            const index = Math.floor(Math.random() * preguntasDGT.length);
            return preguntasDGT[index];
        }
        
        async function iniciarPartida() {
            if (!salaData.preguntas || salaData.preguntas.length === 0) {
                const preguntas = [];
                for (let i = 0; i < 10; i++) {
                    preguntas.push(obtenerPreguntaAleatoria());
                }
                await updateDoc(doc(db, "partidas_multijugador", salaId), {
                    preguntas: preguntas,
                    turno: 0,
                    puntuacion1: 0,
                    puntuacion2: 0
                });
            }
            renderizarJuego();
        }
        
        async function responder(respuesta) {
            if (!gameActivo || respuestaSeleccionada) return;
            if (salaData.turno !== (esJugador1 ? 0 : 1)) {
                alert("Espera tu turno!");
                return;
            }
            
            respuestaSeleccionada = true;
            const pregunta = salaData.preguntas[salaData.turno];
            const esCorrecto = (respuesta === pregunta.correcta);
            
            // Marcar opción seleccionada
            const opciones = document.querySelectorAll('.option-btn');
            opciones.forEach((btn, idx) => {
                btn.classList.add('disabled');
                if (idx === pregunta.correcta) btn.classList.add('correct');
                if (idx === respuesta && respuesta !== pregunta.correcta) btn.classList.add('incorrect');
            });
            
            // Mostrar feedback
            const feedbackDiv = document.getElementById('feedback');
            if (feedbackDiv) {
                feedbackDiv.className = esCorrecto ? 'result-message correct' : 'result-message wrong';
                feedbackDiv.innerHTML = esCorrecto ? 
                    `<i class="fas fa-check-circle"></i> ¡Correcto! +1 punto` : 
                    `<i class="fas fa-times-circle"></i> Incorrecto. La respuesta era: ${String.fromCharCode(65 + pregunta.correcta)}`;
                feedbackDiv.style.display = 'block';
            }
            
            // Actualizar puntuación
            const nuevaPuntuacion1 = salaData.puntuacion1 + (esJugador1 && esCorrecto ? 1 : 0);
            const nuevaPuntuacion2 = salaData.puntuacion2 + (!esJugador1 && esCorrecto ? 1 : 0);
            const nuevoTurno = salaData.turno + 1;
            
            await updateDoc(doc(db, "partidas_multijugador", salaId), {
                puntuacion1: nuevaPuntuacion1,
                puntuacion2: nuevaPuntuacion2,
                turno: nuevoTurno
            });
            
            // Verificar si terminó el juego
            if (nuevoTurno >= salaData.preguntas.length) {
                setTimeout(() => finalizarJuego(), 1500);
            } else {
                setTimeout(() => {
                    respuestaSeleccionada = false;
                    renderizarJuego();
                }, 2000);
            }
        }
        
        function renderizarJuego() {
            const container = document.getElementById('gameContent');
            const jugador1Nombre = salaData.jugador1Nombre || "Jugador 1";
            const jugador2Nombre = salaData.jugador2Nombre || "Jugador 2";
            const puntos1 = salaData.puntuacion1 || 0;
            const puntos2 = salaData.puntuacion2 || 0;
            const totalPreguntas = salaData.preguntas.length;
            const preguntaIdx = salaData.turno;
            const juegoTerminado = preguntaIdx >= totalPreguntas;
            
            const avance1 = (puntos1 / totalPreguntas) * 100;
            const avance2 = (puntos2 / totalPreguntas) * 100;
            
            if (juegoTerminado) {
                finalizarJuego();
                return;
            }
            
            const pregunta = salaData.preguntas[preguntaIdx];
            const esMiTurno = (salaData.turno === (esJugador1 ? 0 : 1));
            
            container.innerHTML = `
                <div class="race-track">
                    <div class="track">
                        <div class="player-name">🏎️ ${jugador1Nombre}</div>
                        <div class="car azul" style="left: ${Math.min(avance1, 98)}%">🏎️</div>
                        <div class="finish-line"></div>
                    </div>
                    <div class="track">
                        <div class="player-name">🏎️ ${jugador2Nombre}</div>
                        <div class="car rojo" style="left: ${Math.min(avance2, 98)}%">🏎️</div>
                        <div class="finish-line"></div>
                    </div>
                </div>
                
                <div class="score-board">
                    <div class="score-item"><div class="score-value">${puntos1}</div><div>${jugador1Nombre}</div></div>
                    <div class="score-item"><div class="score-value">${preguntaIdx + 1}/${totalPreguntas}</div><div>📝 Pregunta</div></div>
                    <div class="score-item"><div class="score-value">${puntos2}</div><div>${jugador2Nombre}</div></div>
                </div>
                
                ${!esMiTurno ? `<div class="turn-indicator"><i class="fas fa-hourglass-half"></i> Esperando respuesta del oponente...</div>` : ''}
                
                <div class="question-card">
                    <div class="question-text">${pregunta.texto}</div>
                    <div class="options" id="optionsContainer">
                        ${pregunta.opciones.map((opcion, idx) => `
                            <div class="option-btn" data-opcion="${idx}">
                                <span class="option-prefix">${String.fromCharCode(65 + idx)}.</span>
                                <span>${opcion}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div id="feedback" class="result-message" style="display: none;"></div>
                </div>
            `;
            
            if (esMiTurno && gameActivo) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (!respuestaSeleccionada && gameActivo) {
                            const opcion = parseInt(btn.dataset.opcion);
                            responder(opcion);
                        }
                    });
                });
            } else if (!esMiTurno) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.classList.add('disabled');
                });
            }
        }
        
        async function finalizarJuego() {
            gameActivo = false;
            const puntos1 = salaData.puntuacion1 || 0;
            const puntos2 = salaData.puntuacion2 || 0;
            const ganador = puntos1 > puntos2 ? salaData.jugador1Nombre : (puntos2 > puntos1 ? salaData.jugador2Nombre : "Empate");
            const esGanador = (puntos1 > puntos2 && esJugador1) || (puntos2 > puntos1 && !esJugador1);
            
            const container = document.getElementById('gameContent');
            container.innerHTML = `
                <div class="waiting-message">
                    <i class="fas fa-trophy" style="font-size: 4rem; color: #fbbf24;"></i>
                    <h2>🏆 ¡PARTIDA FINALIZADA! 🏆</h2>
                    <p><strong>${salaData.jugador1Nombre}</strong>: ${puntos1} puntos</p>
                    <p><strong>${salaData.jugador2Nombre}</strong>: ${puntos2} puntos</p>
                    <h3 style="margin: 20px 0;">${ganador === "Empate" ? "¡EMPATE!" : `¡${esGanador ? "HAS GANADO" : "HA GANADO"} ${ganador}!`}</h3>
                    <button onclick="window.location.href='lobby.html'" style="background: #fbbf24; color: #1a472a; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; margin-top: 20px;"><i class="fas fa-redo"></i> Jugar de nuevo</button>
                    <a href="../index.html" style="display: inline-block; margin-left: 10px; background: rgba(255,255,255,0.2); color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none;">Volver al menú</a>
                </div>
            `;
            
            // Guardar puntuación en localStorage
            const stats = JSON.parse(localStorage.getItem('aprobadoya_minijuegos') || '{}');
            stats.totalJuegos = (stats.totalJuegos || 0) + 1;
            stats.totalPuntos = (stats.totalPuntos || 0) + (esGanador ? 100 : 50);
            localStorage.setItem('aprobadoya_minijuegos', JSON.stringify(stats));
            
            // Limpiar la sala
            if (unsubscribe) unsubscribe();
            await updateDoc(doc(db, "partidas_multijugador", salaId), { estado: "terminado" });
        }
        
        async function cargarPartida() {
            const salaRef = doc(db, "partidas_multijugador", salaId);
            const salaDoc = await getDoc(salaRef);
            if (!salaDoc.exists()) {
                window.location.href = 'lobby.html';
                return;
            }
            salaData = salaDoc.data();
            esJugador1 = salaData.jugador1 === currentUser.uid;
            
            if (salaData.estado === "esperando") {
                const container = document.getElementById('gameContent');
                container.innerHTML = `
                    <div class="waiting-message">
                        <div class="spinner"></div>
                        <p>Esperando a que se una otro jugador...</p>
                        <p>Código de partida: <strong style="color: #fbbf24;">${salaData.codigo || '---'}</strong></p>
                    </div>
                `;
            } else if (salaData.estado === "en_curso") {
                if (!salaData.preguntas || salaData.preguntas.length === 0) {
                    await iniciarPartida();
                } else {
                    renderizarJuego();
                }
            }
            
            unsubscribe = onSnapshot(salaRef, (doc) => {
                if (doc.exists()) {
                    salaData = doc.data();
                    if (salaData.estado === "en_curso" && gameActivo) {
                        if (!salaData.preguntas || salaData.preguntas.length === 0) {
                            iniciarPartida();
                        } else {
                            renderizarJuego();
                        }
                    }
                }
            });
        }
        
        onAuthStateChanged(auth, async (user) => {
            renderUserZone();
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            currentUser = user;
            
            const urlParams = new URLSearchParams(window.location.search);
            salaId = urlParams.get('sala');
            
            if (!salaId) {
                window.location.href = 'lobby.html';
                return;
            }
            
            await cargarPartida();
        });
    </script>
</body>
</html>
