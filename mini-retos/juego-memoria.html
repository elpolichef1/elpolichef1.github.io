<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria de señales | Mini Retos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-header {
            background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%);
            color: white;
            padding: 30px 0;
            text-align: center;
        }
        .game-header h1 { font-size: 2rem; margin-bottom: 10px; }
        .game-header h1 i { color: #fbbf24; }
        
        .game-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            background: white;
            border-radius: 25px;
            padding: 20px 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .score-item { text-align: center; flex: 1; }
        .score-value { font-size: 2rem; font-weight: 800; color: #fbbf24; }
        .score-label { font-size: 0.8rem; color: #64748b; margin-top: 5px; }
        
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .memory-card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            transition: all 0.3s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            transform: scale(1);
        }
        .memory-card.flipped {
            background: white;
            border: 2px solid #fbbf24;
            transform: rotateY(180deg);
        }
        .memory-card.matched {
            background: #d1fae5;
            border: 2px solid #10b981;
            cursor: default;
            opacity: 0.7;
            transform: scale(0.95);
        }
        .memory-card:hover:not(.matched) {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .btn-reiniciar {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a472a;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-reiniciar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(251,191,36,0.3);
        }
        .mensaje-victoria {
            text-align: center;
            padding: 30px;
            background: #d1fae5;
            border-radius: 25px;
            margin-top: 20px;
        }
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .matched-animation {
            animation: celebrate 0.3s ease;
        }
        @media (max-width: 768px) {
            .memory-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .memory-card { font-size: 2rem; }
        }
        @media (max-width: 480px) {
            .memory-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><i class="fas fa-check-circle"></i><h1>Aprobado<span>Ya</span></h1></div>
            <div class="nav-container"><div class="nav-wrapper"><nav><ul><li><a href="../index.html">Inicio</a></li><li><a href="../temas/index.html">Temas</a></li><li><a href="../test/index.html">Test</a></li><li><a href="../mini-retos/index.html" class="active">Mini Retos</a></li></ul></nav></div></div>
            <div class="user-zone" id="userZone"></div>
            <button class="menu-mobile" id="menuMobileBtn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="game-header">
        <div class="container">
            <h1><i class="fas fa-brain"></i> Memoria de señales</h1>
            <p>Encuentra las parejas de señales de tráfico. ¡Pon a prueba tu memoria visual!</p>
        </div>
    </div>

    <div class="game-container">
        <div class="score-board">
            <div class="score-item"><div class="score-value" id="movimientos">0</div><div class="score-label">🔄 Movimientos</div></div>
            <div class="score-item"><div class="score-value" id="paresEncontrados">0</div><div class="score-label">✨ Parejas</div></div>
            <div class="score-item"><div class="score-value" id="tiempo">00:00</div><div class="score-label">⏱️ Tiempo</div></div>
            <div class="score-item"><div class="score-value" id="puntuacion">0</div><div class="score-label">🏆 Puntos</div></div>
        </div>

        <div class="memory-grid" id="memoryGrid"></div>
        
        <button class="btn-reiniciar" id="reiniciarBtn"><i class="fas fa-redo"></i> Reiniciar juego</button>
    </div>

    <script type="module">
        import { auth, onAuthStateChanged, signOut } from '../js/firebase-init.js';
        
        let currentUserId = null;
        
        const señales = [
            { icono: "🛑", nombre: "STOP" }, { icono: "⚠️", nombre: "Peligro" }, { icono: "🚫", nombre: "Prohibido" },
            { icono: "➡️", nombre: "Dirección obligatoria" }, { icono: "🅿️", nombre: "Estacionamiento" }, { icono: "🚸", nombre: "Paso de peatones" },
            { icono: "🚲", nombre: "Carril bici" }, { icono: "🚌", nombre: "Parada de autobús" }
        ];

        let cartas = [], cartasVolteadas = [], bloqueado = false, movimientos = 0, pares = 0, tiempo = 0, puntuacion = 0, timerInterval, juegoTerminado = false;

        function calcularPuntuacion() { return Math.max(0, Math.floor(1000 - movimientos * 3 - tiempo * 0.5)); }

        function initGame() {
            let nuevas = [];
            señales.forEach((s, i) => {
                nuevas.push({ id: i * 2, señalId: i, icono: s.icono, nombre: s.nombre, volteada: false, emparejada: false });
                nuevas.push({ id: i * 2 + 1, señalId: i, icono: s.icono, nombre: s.nombre, volteada: false, emparejada: false });
            });
            for (let i = nuevas.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [nuevas[i], nuevas[j]] = [nuevas[j], nuevas[i]]; }
            cartas = nuevas; cartasVolteadas = []; bloqueado = false; movimientos = 0; pares = 0; tiempo = 0; juegoTerminado = false;
            document.getElementById('movimientos').textContent = movimientos; document.getElementById('paresEncontrados').textContent = pares;
            document.getElementById('tiempo').textContent = '00:00'; actualizarPuntuacion();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => { if (!juegoTerminado) { tiempo++; const m = Math.floor(tiempo / 60), s = tiempo % 60; document.getElementById('tiempo').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; actualizarPuntuacion(); } }, 1000);
            renderGrid();
        }

        function actualizarPuntuacion() { puntuacion = calcularPuntuacion(); document.getElementById('puntuacion').textContent = puntuacion; }

        function renderGrid() {
            const grid = document.getElementById('memoryGrid');
            if (!grid) return;
            grid.innerHTML = cartas.map((c, idx) => `<div class="memory-card ${c.emparejada ? 'matched' : ''} ${c.volteada ? 'flipped' : ''}" data-idx="${idx}">${c.volteada || c.emparejada ? c.icono : '❓'}</div>`).join('');
            
            document.querySelectorAll('.memory-card').forEach(card => {
                card.addEventListener('click', () => {
                    const idx = parseInt(card.dataset.idx);
                    if (!isNaN(idx)) voltearCarta(idx);
                });
            });
        }

        function voltearCarta(idx) {
            if (bloqueado || juegoTerminado || cartas[idx].emparejada || cartasVolteadas.includes(idx) || cartasVolteadas.length === 2) return;
            cartas[idx].volteada = true; cartasVolteadas.push(idx); renderGrid();
            if (cartasVolteadas.length === 2) { movimientos++; document.getElementById('movimientos').textContent = movimientos; actualizarPuntuacion(); verificarPareja(); }
        }

        function verificarPareja() {
            const [i1, i2] = cartasVolteadas, c1 = cartas[i1], c2 = cartas[i2];
            if (c1.señalId === c2.señalId) {
                c1.emparejada = true; c2.emparejada = true; c1.volteada = false; c2.volteada = false; pares++;
                document.getElementById('paresEncontrados').textContent = pares; actualizarPuntuacion();
                setTimeout(() => { cartasVolteadas = []; renderGrid(); }, 300);
                if (pares === señales.length) finalizarJuego(true);
            } else {
                bloqueado = true;
                setTimeout(() => { c1.volteada = false; c2.volteada = false; cartasVolteadas = []; bloqueado = false; renderGrid(); }, 800);
            }
        }

        function finalizarJuego(victoria) {
            if (juegoTerminado) return;
            juegoTerminado = true; 
            clearInterval(timerInterval);
            const puntosFinales = puntuacion;
            
            console.log("🎮 Finalizando juego. Puntos:", puntosFinales);
            
            // Guardar en localStorage
            const stats = JSON.parse(localStorage.getItem('aprobadoya_minijuegos') || '{}');
            const nuevoRegistro = {
                id: Date.now(),
                juego: "Memoria de señales",
                puntuacion: puntosFinales,
                fecha: new Date().toLocaleString(),
                aciertos: pares,
                total: señales.length,
                racha: pares,
                movimientos: movimientos,
                tiempo: tiempo
            };
            
            const historialActual = stats.historial || [];
            stats.historial = [nuevoRegistro, ...historialActual].slice(0, 20);
            stats.totalJuegos = (stats.totalJuegos || 0) + 1;
            stats.totalPuntos = (stats.totalPuntos || 0) + puntosFinales;
            stats.mejorRacha = Math.max(stats.mejorRacha || 0, pares);
            
            localStorage.setItem('aprobadoya_minijuegos', JSON.stringify(stats));
            
            console.log("✅ Historial guardado en localStorage:", nuevoRegistro);
            
            // Mostrar mensaje de victoria
            const container = document.querySelector('.game-container');
            const oldMsg = container.querySelector('.mensaje-victoria'); 
            if (oldMsg) oldMsg.remove();
            const msgDiv = document.createElement('div'); 
            msgDiv.className = 'mensaje-victoria';
            msgDiv.innerHTML = `<i class="fas fa-trophy" style="font-size: 3rem; color: #fbbf24;"></i>
                <h2 style="color:#10b981;">🏆 ¡FELICIDADES! 🏆</h2>
                <p>Has completado el juego de memoria</p>
                <p><strong>🔄 Movimientos:</strong> ${movimientos}</p>
                <p><strong>⏱️ Tiempo:</strong> ${Math.floor(tiempo / 60)}:${(tiempo % 60).toString().padStart(2, '0')}</p>
                <p><strong>🏆 Puntuación:</strong> ${puntosFinales} pts</p>
                <button onclick="window.location.reload()" style="background:#fbbf24; color:#1a472a; border:none; padding:10px 25px; border-radius:50px; margin-top:15px; cursor:pointer;"><i class="fas fa-redo"></i> Jugar de nuevo</button>
                <a href="index.html" style="display:inline-block; margin-left:10px; background:#f1f5f9; color:#1e293b; padding:10px 25px; border-radius:50px; text-decoration:none;"><i class="fas fa-arrow-left"></i> Volver al menú</a>`;
            container.appendChild(msgDiv);
        }

        function reiniciarJuego() { 
            const oldMsg = document.querySelector('.mensaje-victoria'); 
            if (oldMsg) oldMsg.remove(); 
            initGame(); 
        }
        
        function renderUserZone() {
            const userZone = document.getElementById('userZone');
            if (!userZone) return;
            const user = auth.currentUser;
            if (user) {
                userZone.innerHTML = `<div class="user-menu"><div class="user-avatar">🚗</div><span class="user-name">${user.email.split('@')[0]}</span><a href="../perfil/index.html" class="btn-profile">Mi perfil</a><button id="logoutBtn" class="btn-logout">Cerrar sesión</button></div>`;
                document.getElementById('logoutBtn')?.addEventListener('click', async () => { await signOut(auth); window.location.href = '../index.html'; });
            } else {
                userZone.innerHTML = `<a href="../login.html" class="btn-login"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</a>`;
            }
        }
        
        onAuthStateChanged(auth, (user) => {
            renderUserZone();
            if (!user) {
                window.location.href = '../login.html';
            } else {
                currentUserId = user.uid;
                console.log("✅ Usuario autenticado:", currentUserId);
                initGame();
            }
        });
        
        document.getElementById('reiniciarBtn').addEventListener('click', reiniciarJuego);
        document.getElementById('menuMobileBtn')?.addEventListener('click', () => {
            document.querySelector('.nav-wrapper')?.classList.toggle('active');
        });
    </script>
</body>
</html>
