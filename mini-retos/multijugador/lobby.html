<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrera Multijugador | AprobadoYa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 500px; margin: 0 auto; padding: 40px 20px; }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        h1 i { color: #fbbf24; }
        .btn {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a472a;
            border: none;
            padding: 15px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #fbbf24;
            color: #fbbf24;
        }
        .codigo-input {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .codigo-input input {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            border: none;
            text-align: center;
            font-size: 1rem;
            letter-spacing: 3px;
        }
        .codigo-input button {
            background: #fbbf24;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
        }
        .waiting-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .waiting-card {
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
        }
        .waiting-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .codigo-grande {
            font-size: 2rem;
            letter-spacing: 5px;
            color: #fbbf24;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1><i class="fas fa-flag-checkered"></i> Carrera Multijugador</h1>
            <button class="btn" id="btnAleatorio">🎲 Emparejamiento aleatorio</button>
            <button class="btn btn-outline" id="btnCrearPartida">➕ Crear partida privada</button>
            <div class="codigo-input">
                <input type="text" id="codigoInput" placeholder="Código" maxlength="6">
                <button id="btnUnirse">Unirse</button>
            </div>
        </div>
    </div>

    <div id="waitingScreen" class="waiting-screen">
        <div class="waiting-card">
            <div class="waiting-spinner"></div>
            <h3>Esperando oponente...</h3>
            <div class="codigo-grande" id="codigoDisplay">------</div>
            <button id="btnCancelar" style="background: rgba(255,255,255,0.2); color: white; border: none; padding: 10px 25px; border-radius: 50px;">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, onSnapshot } from '../../js/firebase-init.js';
        import { renderUserZone } from '../../js/global-auth.js';
        
        let currentUser = null;
        let unsubscribeActual = null;
        
        function generarCodigo() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }
        
        async function crearSala() {
            const codigo = generarCodigo();
            const salaId = `sala_${Date.now()}`;
            await setDoc(doc(db, "partidas_multijugador", salaId), {
                id: salaId,
                codigo: codigo,
                jugador1: currentUser.uid,
                jugador1Nombre: currentUser.displayName || currentUser.email.split('@')[0],
                jugador2: null,
                estado: "esperando"
            });
            return { salaId, codigo };
        }
        
        async function buscarSala() {
            const salasRef = collection(db, "partidas_multijugador");
            const q = query(salasRef, where("estado", "==", "esperando"), where("jugador1", "!=", currentUser.uid));
            const snapshot = await getDocs(q);
            if (!snapshot.empty) {
                const sala = snapshot.docs[0];
                await updateDoc(sala.ref, {
                    jugador2: currentUser.uid,
                    jugador2Nombre: currentUser.displayName || currentUser.email.split('@')[0],
                    estado: "en_curso"
                });
                return sala.id;
            }
            return null;
        }
        
        async function unirsePorCodigo(codigo) {
            const salasRef = collection(db, "partidas_multijugador");
            const q = query(salasRef, where("codigo", "==", codigo), where("estado", "==", "esperando"));
            const snapshot = await getDocs(q);
            if (snapshot.empty) return null;
            const sala = snapshot.docs[0];
            await updateDoc(sala.ref, {
                jugador2: currentUser.uid,
                jugador2Nombre: currentUser.displayName || currentUser.email.split('@')[0],
                estado: "en_curso"
            });
            return sala.id;
        }
        
        function esperarOponente(salaId, codigo) {
            document.getElementById('codigoDisplay').textContent = codigo;
            document.getElementById('waitingScreen').style.display = 'flex';
            
            const salaRef = doc(db, "partidas_multijugador", salaId);
            unsubscribeActual = onSnapshot(salaRef, (doc) => {
                if (doc.exists() && doc.data().estado === "en_curso") {
                    if (unsubscribeActual) unsubscribeActual();
                    window.location.href = `juego-multijugador.html?sala=${salaId}`;
                }
            });
        }
        
        onAuthStateChanged(auth, (user) => {
            renderUserZone();
            if (!user) { window.location.href = '../../login.html'; return; }
            currentUser = user;
        });
        
        document.getElementById('btnAleatorio').addEventListener('click', async () => {
            let salaId = await buscarSala();
            if (!salaId) {
                const { salaId: nuevaSala, codigo } = await crearSala();
                esperarOponente(nuevaSala, codigo);
            } else {
                window.location.href = `juego-multijugador.html?sala=${salaId}`;
            }
        });
        
        document.getElementById('btnCrearPartida').addEventListener('click', async () => {
            const { salaId, codigo } = await crearSala();
            esperarOponente(salaId, codigo);
        });
        
        document.getElementById('btnUnirse').addEventListener('click', async () => {
            const codigo = document.getElementById('codigoInput').value.trim();
            if (codigo.length !== 6) { alert("Código de 6 dígitos"); return; }
            const salaId = await unirsePorCodigo(codigo);
            if (salaId) {
                window.location.href = `juego-multijugador.html?sala=${salaId}`;
            } else {
                alert("Partida no encontrada");
            }
        });
        
        document.getElementById('btnCancelar').addEventListener('click', () => {
            if (unsubscribeActual) unsubscribeActual();
            document.getElementById('waitingScreen').style.display = 'none';
        });
    </script>
</body>
</html>
