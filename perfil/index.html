<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | AprobadoYa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .page-header {
            text-align: center;
            padding: 40px 0;
            background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%);
            color: white;
            margin-bottom: 40px;
        }
        .page-header h1 { font-size: 2rem; margin-bottom: 10px; }
        .page-header h1 i { color: #fbbf24; }
        
        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            margin-bottom: 60px;
        }
        
        /* Sidebar perfil */
        .profile-sidebar {
            background: white;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            position: sticky;
            top: 100px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .profile-avatar:hover { transform: scale(1.05); }
        .profile-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 5px; }
        .profile-email { color: #64748b; font-size: 0.85rem; margin-bottom: 20px; }
        .profile-stats-mini {
            background: #f8fafc;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
        }
        .profile-stats-mini p { margin: 8px 0; font-size: 0.85rem; }
        
        /* Main content */
        .profile-main {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i { color: #fbbf24; }
        
        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-3px); background: #fef3c7; }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: #fbbf24; }
        .stat-label { font-size: 0.7rem; color: #64748b; margin-top: 5px; }
        
        /* Gráficos */
        .graficos-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }
        .grafico-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .grafico-card h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #1e293b;
        }
        .grafico-canvas {
            width: 100%;
            max-width: 200px;
            margin: 0 auto;
        }
        canvas { width: 100%; height: auto; background: transparent; }
        
        /* Progreso */
        .progress-item {
            margin-bottom: 20px;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            border-radius: 4px;
            width: 0%;
            transition: width 0.5s ease;
        }
        
        /* Tests recientes */
        .tests-recientes {
            margin-top: 30px;
        }
        .test-reciente-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 10px;
        }
        .test-reciente-item.aprobado { border-left: 3px solid #10b981; padding-left: 15px; }
        .test-reciente-item.suspendido { border-left: 3px solid #ef4444; padding-left: 15px; }
        .test-reciente-info { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .test-reciente-tipo { font-weight: 600; color: #1e293b; }
        .test-reciente-fecha { font-size: 0.7rem; color: #94a3b8; }
        .test-reciente-resultado { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .test-reciente-aciertos { font-weight: 600; }
        .test-reciente-porcentaje { font-weight: 700; padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; }
        .test-reciente-porcentaje.aprobado-text { background: #d1fae5; color: #065f46; }
        .test-reciente-porcentaje.suspendido-text { background: #fee2e2; color: #991b1b; }
        .empty-tests { text-align: center; padding: 40px; color: #94a3b8; }
        .empty-tests i { font-size: 3rem; margin-bottom: 10px; display: block; }
        
        .btn-recargar {
            background: #f1f5f9;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .btn-recargar:hover { background: #e2e8f0; }
        
        @media (max-width: 992px) {
            .profile-container { grid-template-columns: 1fr; }
            .graficos-container { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .test-reciente-item { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><i class="fas fa-check-circle"></i><h1>Aprobado<span>Ya</span></h1></div>
            <div class="nav-container"><div class="nav-wrapper"><nav><ul><li><a href="../index.html">Inicio</a></li><li><a href="../temas/index.html">Temas</a></li><li><a href="../test/index.html">Test</a></li><li><a href="../simulacro/index.html">Simulacro</a></li><li><a href="../ranking/index.html">Ranking</a></li><li><a href="../mini-retos/index.html">🏎️ Mini Retos</a></li></ul></nav></div></div>
            <div class="user-zone" id="userZone"></div>
            <button class="menu-mobile" id="menuMobileBtn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="page-header">
        <div class="container">
            <h1><i class="fas fa-chart-line"></i> Mi Perfil</h1>
            <p>Visualiza tu progreso y estadísticas completas</p>
        </div>
    </div>

    <main>
        <div class="container">
            <div id="profileContent"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-grid"><div class="footer-col"><h4>AprobadoYa</h4><p>Tu plataforma para aprobar el carnet de conducir al primer intento.</p></div></div>
            <div class="footer-bottom"><p>© 2025 AprobadoYa | Todos los derechos reservados</p></div>
        </div>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/stats.js"></script>
    <script>
        function renderProfile() {
            const currentUser = getCurrentUser();
            const container = document.getElementById('profileContent');
            
            if (!currentUser) {
                container.innerHTML = `<div style="text-align:center; padding:60px; background:white; border-radius:25px;"><i class="fas fa-lock" style="font-size:3rem; color:#fbbf24;"></i><h3>Necesitas iniciar sesión</h3><p>Para ver tu perfil, inicia sesión o regístrate.</p><a href="../login.html" class="btn-primary" style="display:inline-block; margin-top:20px;">Iniciar sesión</a></div>`;
                return;
            }
            
            const stats = obtenerEstadisticasCompletas();
            const avatar = currentUser.avatar || "🚗";
            
            container.innerHTML = `
                <div class="profile-container">
                    <div class="profile-sidebar">
                        <div class="profile-avatar" onclick="toggleAvatarSelector()">${avatar}</div>
                        <div class="profile-name">${currentUser.nombre}</div>
                        <div class="profile-email">${currentUser.email}</div>
                        <div class="profile-stats-mini">
                            <p><i class="fas fa-calendar"></i> Miembro desde: ${currentUser.fechaRegistro}</p>
                            <p><i class="fas fa-trophy"></i> Tests realizados: ${stats?.totalTests || 0}</p>
                            <p><i class="fas fa-chart-line"></i> Media global: ${stats?.porcentajeGlobal || 0}%</p>
                        </div>
                        <div class="avatar-selector" id="avatarSelector" style="display: none; margin-top: 15px;">
                            <div class="avatar-list" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
                                ${avataresDisponibles.map(a => `<div class="avatar-option" onclick="cambiarAvatar('${a}')" style="width:45px; height:45px; background:#f8fafc; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem; cursor:pointer; border:2px solid ${avatar === a ? '#fbbf24' : 'transparent'};">${a}</div>`).join('')}
                            </div>
                        </div>
                        <button class="btn-editar" onclick="toggleAvatarSelector()" style="margin-top:10px; background:none; border:none; color:#fbbf24; cursor:pointer;"><i class="fas fa-edit"></i> Cambiar avatar</button>
                    </div>
                    <div class="profile-main">
                        <div class="section-title"><i class="fas fa-chart-simple"></i> Estadísticas Generales</div>
                        <div class="stats-grid">
                            <div class="stat-card"><div class="stat-number" id="totalTests">0</div><div class="stat-label">Tests realizados</div></div>
                            <div class="stat-card"><div class="stat-number" id="totalAciertos">0</div><div class="stat-label">Aciertos totales</div></div>
                            <div class="stat-card"><div class="stat-number" id="totalPreguntas">0</div><div class="stat-label">Preguntas respondidas</div></div>
                            <div class="stat-card"><div class="stat-number" id="porcentajeGlobal">0%</div><div class="stat-label">Media de aciertos</div></div>
                            <div class="stat-card"><div class="stat-number" id="mejorResultado">0%</div><div class="stat-label">Mejor resultado</div></div>
                            <div class="stat-card"><div class="stat-number" id="peorResultado">0%</div><div class="stat-label">Peor resultado</div></div>
                            <div class="stat-card"><div class="stat-number" id="temasEstudiados">0/20</div><div class="stat-label">Temas estudiados</div></div>
                            <div class="stat-card"><div class="stat-number" id="testsAprobados">0</div><div class="stat-label">Tests aprobados</div></div>
                        </div>
                        
                        <div class="section-title"><i class="fas fa-chart-pie"></i> Rendimiento Global</div>
                        <div class="graficos-container">
                            <div class="grafico-card">
                                <h3>📊 Progreso general</h3>
                                <div class="grafico-canvas">
                                    <canvas id="graficoGlobal" width="200" height="200" style="width:100%; max-width:200px; height:auto;"></canvas>
                                </div>
                                <p id="porcentajeTexto" style="margin-top:10px; font-weight:600;">0% de aciertos</p>
                            </div>
                            <div class="grafico-card">
                                <h3>📈 Rendimiento por temas (top 8)</h3>
                                <div class="grafico-canvas">
                                    <canvas id="graficoTemas" width="400" height="200" style="width:100%; height:auto;"></canvas>
                                </div>
                            </div>
                        </div>
                        
                        <div class="section-title"><i class="fas fa-tasks"></i> Progreso de estudio</div>
                        <div class="progress-item">
                            <div class="progress-header"><span><i class="fas fa-book-open"></i> Temas completados</span><span id="temasProgressText">0/20 temas</span></div>
                            <div class="progress-bar"><div class="progress-fill" id="temasProgressFill" style="width:0%"></div></div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-header"><span><i class="fas fa-clipboard-list"></i> Tests realizados</span><span id="testsProgressText">0/50 tests</span></div>
                            <div class="progress-bar"><div class="progress-fill" id="testsProgressFill" style="width:0%"></div></div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-header"><span><i class="fas fa-trophy"></i> Tasa de aprobados</span><span id="tasaAprobados">0%</span></div>
                            <div class="progress-bar"><div class="progress-fill" id="tasaProgressFill" style="width:0%"></div></div>
                        </div>
                        
                        <div class="section-title"><i class="fas fa-history"></i> Tests Recientes</div>
                        <div id="recentTestsList" class="tests-recientes"></div>
                        
                        <button class="btn-recargar" onclick="recargarEstadisticas()" style="margin-top:15px;"><i class="fas fa-sync-alt"></i> Actualizar estadísticas</button>
                    </div>
                </div>
            `;
            
            // Actualizar estadísticas
            if (stats) {
                document.getElementById('totalTests').textContent = stats.totalTests;
                document.getElementById('totalAciertos').textContent = stats.totalAciertos;
                document.getElementById('totalPreguntas').textContent = stats.totalPreguntas;
                document.getElementById('porcentajeGlobal').textContent = `${stats.porcentajeGlobal}%`;
                document.getElementById('mejorResultado').textContent = `${stats.mejorResultado}%`;
                document.getElementById('peorResultado').textContent = `${stats.peorResultado}%`;
                document.getElementById('temasEstudiados').textContent = `${stats.temasEstudiados}/20`;
                document.getElementById('testsAprobados').textContent = stats.testsAprobados;
                document.getElementById('tasaAprobados').textContent = `${stats.tasaAprobados}%`;
                document.getElementById('porcentajeTexto').textContent = `${stats.porcentajeGlobal}% de aciertos`;
                
                document.getElementById('tasaProgressFill').style.width = `${stats.tasaAprobados}%`;
                
                // Gráficos
                crearGraficoCircular('graficoGlobal', stats.porcentajeGlobal);
                
                const temasRendimiento = [];
                const temasNombres = [];
                for (let i = 1; i <= 20; i++) {
                    const tema = stats.estadisticasPorTema[i];
                    if (tema.total > 0) {
                        temasRendimiento.push(Math.round((tema.aciertos / tema.total) * 100));
                        temasNombres.push(`T${i}`);
                    }
                }
                if (temasRendimiento.length > 0) {
                    crearGraficoBarras('graficoTemas', temasRendimiento.slice(0, 8), temasNombres.slice(0, 8));
                }
                
                // Tests recientes
                const recentList = document.getElementById('recentTestsList');
                if (stats.testsRecientes.length > 0) {
                    recentList.innerHTML = stats.testsRecientes.map(test => {
                        const fecha = new Date(test.fecha).toLocaleDateString('es-ES');
                        const porcentaje = Math.round((test.aciertos / test.total) * 100);
                        const aprobado = porcentaje >= 90;
                        const tipo = test.tema ? `Tema ${test.tema}` : (test.tipo || 'Test');
                        return `
                            <div class="test-reciente-item ${aprobado ? 'aprobado' : 'suspendido'}">
                                <div class="test-reciente-info">
                                    <span class="test-reciente-tipo">${tipo}</span>
                                    <span class="test-reciente-fecha">${fecha}</span>
                                </div>
                                <div class="test-reciente-resultado">
                                    <span class="test-reciente-aciertos">${test.aciertos}/${test.total}</span>
                                    <span class="test-reciente-porcentaje ${aprobado ? 'aprobado-text' : 'suspendido-text'}">${porcentaje}%</span>
                                    <span class="test-reciente-estado">${aprobado ? '✅ Aprobado' : '❌ Suspendido'}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    recentList.innerHTML = '<div class="empty-tests"><i class="fas fa-clipboard-list"></i><p>No has realizado ningún test aún. ¡Empieza a practicar!</p></div>';
                }
            }
            
            // Progreso de temas
            const progreso = localStorage.getItem('aprobadoya_progreso');
            const temasCompletados = progreso ? Object.values(JSON.parse(progreso)).filter(v => v === true).length : 0;
            const pctTemas = Math.round((temasCompletados / 20) * 100);
            document.getElementById('temasProgressFill').style.width = `${pctTemas}%`;
            document.getElementById('temasProgressText').textContent = `${temasCompletados}/20 temas (${pctTemas}%)`;
            
            // Progreso de tests
            const tests = JSON.parse(localStorage.getItem('dgt_tests') || '[]');
            const totalTests = tests.length;
            const pctTests = Math.min(Math.round((totalTests / 50) * 100), 100);
            document.getElementById('testsProgressFill').style.width = `${pctTests}%`;
            document.getElementById('testsProgressText').textContent = `${totalTests}/50 tests (${pctTests}%)`;
        }
        
        const avataresDisponibles = ["🚗", "🚘", "🏎️", "🚙", "🛞", "🚦", "🛣️", "🚸", "⚠️", "🅿️", "🚥", "🚧", "🎯", "📍", "🧭", "🚔", "🚓", "🚕", "🚑", "🚒", "🚌", "🚎"];
        
        function toggleAvatarSelector() {
            const selector = document.getElementById('avatarSelector');
            if (selector) selector.style.display = selector.style.display === 'none' ? 'flex' : 'none';
        }
        
        function cambiarAvatar(avatar) {
            updateUserAvatar(avatar);
            renderProfile();
            renderUserZone();
            const toast = document.createElement('div');
            toast.textContent = '✅ Avatar actualizado correctamente';
            toast.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#10b981; color:white; padding:12px 24px; border-radius:50px; z-index:1000; animation:fadeInOut 2s ease;';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function recargarEstadisticas() {
            renderProfile();
        }
        
        function renderUserZone() {
            const u = getCurrentUser();
            const z = document.getElementById('userZone');
            if (u) z.innerHTML = `<div class="user-menu"><div class="user-avatar">${u.avatar || "🚗"}</div><span class="user-name">${u.nombre}</span><a href="index.html" class="btn-profile">Mi perfil</a><button onclick="logoutUser()" class="btn-logout">Cerrar sesión</button></div>`;
            else z.innerHTML = `<a href="../login.html" class="btn-login"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</a>`;
        }
        
        renderUserZone();
        renderProfile();
    </script>
</body>
</html>
