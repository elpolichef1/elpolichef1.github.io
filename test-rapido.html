<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Test Rápido | AprobadoYa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f5f3 0%, #e0ece8 100%);
            min-height: 100vh;
            color: #0f2b2d;
        }
        header {
            background: #0a2f2a;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 28px;
        }
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 28px;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .logo i { font-size: 2rem; color: #f5b042; }
        .logo h1 { font-size: 1.7rem; font-weight: 800; color: white; }
        .logo span { color: #f5b042; }
        nav ul {
            display: flex;
            list-style: none;
            gap: 32px;
        }
        nav ul li a {
            text-decoration: none;
            color: #eef2f5;
            font-weight: 500;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        nav ul li a:hover, nav ul li a.active { color: #f5b042; }
        .user-zone { display: flex; align-items: center; }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255,255,255,0.12);
            padding: 6px 20px;
            border-radius: 60px;
        }
        .user-avatar { font-size: 1.6rem; }
        .user-name { color: white; font-weight: 500; }
        .btn-profile, .btn-logout {
            background: #f5b042;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            color: #0a2f2a;
        }
        .btn-logout { background: #e2e8f0; color: #1e293b; }
        .btn-login {
            background: #f5b042;
            padding: 8px 24px;
            border-radius: 40px;
            color: #0a2f2a;
            font-weight: 600;
            text-decoration: none;
        }
        .menu-mobile {
            display: none;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
        }
        
        .page-header {
            background: linear-gradient(125deg, #0f3b2c 0%, #1b5a44 100%);
            padding: 40px 0;
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .page-header h1 { font-size: 2rem; font-weight: 800; }
        .page-header h1 i { color: #f5b042; margin-right: 12px; }
        
        .test-container {
            background: white;
            border-radius: 32px;
            padding: 35px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 15px;
        }
        .test-info {
            display: flex;
            gap: 20px;
        }
        .test-info-item {
            background: #f8fafc;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .timer {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: monospace;
            background: #1e293b;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
        }
        .timer.warning { background: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.9; transform: scale(1.02); } }
        
        .pregunta-card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }
        .pregunta-card.correcta { border-left: 4px solid #10b981; background: #f0fdf4; }
        .pregunta-card.incorrecta { border-left: 4px solid #ef4444; background: #fef2f2; }
        .pregunta-numero {
            font-size: 0.8rem;
            color: #f5b042;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .pregunta-texto {
            font-weight: 600;
            margin-bottom: 18px;
            color: #1e293b;
            font-size: 1rem;
        }
        .senal-emojis {
            font-size: 3rem;
            text-align: center;
            margin: 15px 0;
            background: #f1f5f9;
            border-radius: 20px;
            padding: 15px;
        }
        .opciones {
            display: grid;
            gap: 10px;
            margin-top: 15px;
        }
        .opcion {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .opcion:hover:not(.disabled) {
            background: #fef3c7;
            border-color: #fbbf24;
            transform: translateX(5px);
        }
        .opcion.disabled { cursor: not-allowed; opacity: 0.7; }
        .opcion.correcta-respuesta { background: #d1fae5; border-color: #10b981; }
        .opcion.incorrecta-respuesta { background: #fee2e2; border-color: #ef4444; }
        .explicacion {
            margin-top: 12px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #475569;
            display: none;
        }
        .explicacion.mostrar { display: block; }
        .btn-ver-explicacion {
            background: none;
            border: none;
            color: #f5b042;
            cursor: pointer;
            font-size: 0.7rem;
            margin-top: 10px;
        }
        
        .btn-enviar {
            background: linear-gradient(135deg, #f5b042, #f59e0b);
            color: #1a472a;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn-enviar:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(245,176,66,0.4); }
        
        .resultado {
            margin-top: 25px;
            padding: 25px;
            border-radius: 20px;
            display: none;
            text-align: center;
        }
        .resultado.exito { background: #d1fae5; color: #065f46; }
        .resultado.error { background: #fee2e2; color: #991b1b; }
        .puntuacion-final { font-size: 2.5rem; font-weight: 800; margin: 15px 0; }
        
        .volver {
            display: inline-block;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            transition: 0.2s;
        }
        .volver:hover { color: #f5b042; }
        
        @media (max-width: 768px) {
            .test-container { padding: 20px; }
            .test-header { flex-direction: column; text-align: center; }
            .senal-emojis { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo" onclick="window.location.href='../index.html'">
                <i class="fas fa-check-circle"></i>
                <h1>Aprobado<span>Ya</span></h1>
            </div>
            <div class="nav-container">
                <div class="nav-wrapper" id="navWrapper">
                    <nav>
                        <ul>
                            <li><a href="../index.html">Inicio</a></li>
                            <li><a href="../temas/index.html">Temas</a></li>
                            <li><a href="index.html" class="active">Test</a></li>
                            <li><a href="../simulacro/index.html">Simulacro</a></li>
                            <li><a href="../ranking/index.html">Ranking</a></li>
                            <li><a href="../mini-retos/index.html">🏎️ Mini Retos</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
            <div class="user-zone" id="userZone"></div>
            <button class="menu-mobile" id="menuMobileBtn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="page-header">
        <div class="container">
            <h1><i class="fas fa-bolt"></i> Test Rápido</h1>
            <p>10 preguntas aleatorias para practicar rápidamente</p>
        </div>
    </div>

    <main>
        <div class="container">
            <div class="test-container">
                <div class="test-header">
                    <div class="test-info">
                        <div class="test-info-item"><i class="fas fa-question-circle"></i> Preguntas: <span id="totalPreguntas">10</span></div>
                        <div class="test-info-item"><i class="fas fa-check-circle"></i> Respondidas: <span id="respondidas">0</span></div>
                    </div>
                    <div class="timer" id="timer">10:00</div>
                </div>
                <div id="preguntasContainer"></div>
                <button class="btn-enviar" id="btnEnviar">Finalizar test</button>
                <div id="resultado" class="resultado"></div>
                <a href="index.html" class="volver"><i class="fas fa-arrow-left"></i> Volver a tests</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>© 2025 AprobadoYa | Todos los derechos reservados</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, getDoc, updateDoc } from '../js/firebase-init.js';
        import { renderUserZone } from '../js/global-auth.js';
        import { guardarResultadoTest } from '../js/progreso-tests.js';
        
        // ==================== PREGUNTAS ====================
        const preguntas = [
            { id: 1, texto: "¿Qué indica esta señal?", emoji: "🛑", emojiDescripcion: "Octógono rojo con la palabra STOP", opciones: ["Ceda el paso", "STOP - Detención obligatoria", "Prohibido el paso", "Prioridad"], correcta: 1, explicacion: "La señal de STOP es un octógono rojo que obliga a detenerse completamente antes de continuar." },
            { id: 2, texto: "¿Qué indica esta señal?", emoji: "⚠️", emojiDescripcion: "Triángulo rojo con signo de exclamación", opciones: ["Prohibido el paso", "Peligro", "Ceda el paso", "Dirección obligatoria"], correcta: 1, explicacion: "Las señales triangulares con borde rojo indican ADVERTENCIA DE PELIGRO." },
            { id: 3, texto: "¿Qué indica esta señal?", emoji: "🚫", emojiDescripcion: "Círculo rojo con una línea diagonal", opciones: ["Prohibición", "Obligación", "Peligro", "Información"], correcta: 0, explicacion: "Las señales circulares con fondo blanco y borde rojo indican PROHIBICIÓN." },
            { id: 4, texto: "¿Qué indica esta señal?", emoji: "🔵", emojiDescripcion: "Círculo azul", opciones: ["Prohibición", "Peligro", "Obligación o dirección", "Información"], correcta: 2, explicacion: "Las señales circulares de color azul indican OBLIGACIÓN o DIRECCIÓN OBLIGATORIA." },
            { id: 5, texto: "¿Qué indica esta señal?", emoji: "🔄", emojiDescripcion: "Flecha circular", opciones: ["Prohibido girar", "Sentido obligatorio", "Rotonda", "Ceda el paso"], correcta: 2, explicacion: "Indica la proximidad de una GLORIETA o ROTONDA." },
            { id: 6, texto: "¿Qué indica esta señal?", emoji: "🚗➡️", emojiDescripcion: "Coche con flecha hacia la derecha", opciones: ["Prohibido circular", "Dirección obligatoria", "Carril exclusivo", "Adelantamiento permitido"], correcta: 1, explicacion: "Indica la DIRECCIÓN OBLIGATORIA que deben seguir los vehículos." },
            { id: 7, texto: "¿Qué indica esta señal?", emoji: "🚶‍♂️", emojiDescripcion: "Peatón caminando", opciones: ["Paso de peatones", "Zona peatonal", "Prohibido el paso a peatones", "Carril bici"], correcta: 0, explicacion: "Indica la proximidad de un PASO DE PEATONES." },
            { id: 8, texto: "¿Qué indica esta señal?", emoji: "🚲", emojiDescripcion: "Bicicleta", opciones: ["Prohibido circular en bicicleta", "Carril bici", "Senda ciclista", "Las dos últimas son correctas"], correcta: 3, explicacion: "Indica una VÍA CICLISTA o CARRIL BICI." },
            { id: 9, texto: "¿Qué indica esta señal?", emoji: "🅿️", emojiDescripcion: "Letra P mayúscula", opciones: ["Prohibido estacionar", "Estacionamiento", "Parada de autobús", "Zona de carga"], correcta: 1, explicacion: "Indica ZONA DE ESTACIONAMIENTO permitido." },
            { id: 10, texto: "¿Qué indica esta señal?", emoji: "🏥", emojiDescripcion: "Cruz blanca sobre fondo azul", opciones: ["Hospital", "Farmacia", "Primeros auxilios", "Cruz Roja"], correcta: 0, explicacion: "Indica la proximidad de un HOSPITAL o centro sanitario." }
        ];

        let preguntasActuales = [];
        let respuestasUsuario = [];
        let tiempoRestante = 10 * 60;
        let timerInterval;
        let testActivo = true;
        let currentUser = null;
        let testFinalizado = false;
        
        function mezclarArray(array) {
            const mezclado = [...array];
            for (let i = mezclado.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [mezclado[i], mezclado[j]] = [mezclado[j], mezclado[i]];
            }
            return mezclado;
        }
        
        function iniciarTest() {
            preguntasActuales = mezclarArray(preguntas).slice(0, 10);
            respuestasUsuario = new Array(preguntasActuales.length).fill(null);
            
            document.getElementById('totalPreguntas').textContent = preguntasActuales.length;
            document.getElementById('respondidas').textContent = '0';
            document.getElementById('timer').textContent = '10:00';
            document.getElementById('timer').classList.remove('warning');
            
            iniciarTemporizador();
            renderizarPreguntas();
            testFinalizado = false;
            testActivo = true;
        }
        
        function iniciarTemporizador() {
            if (timerInterval) clearInterval(timerInterval);
            const timerElement = document.getElementById('timer');
            tiempoRestante = 10 * 60;
            
            timerInterval = setInterval(() => {
                if (testFinalizado) return;
                
                tiempoRestante--;
                const minutos = Math.floor(tiempoRestante / 60);
                const segundos = tiempoRestante % 60;
                timerElement.textContent = `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
                
                if (tiempoRestante <= 60) timerElement.classList.add('warning');
                if (tiempoRestante <= 0) {
                    clearInterval(timerInterval);
                    alert('⏰ ¡Se acabó el tiempo!');
                    finalizarTest();
                }
            }, 1000);
        }
        
        function renderizarPreguntas() {
            const container = document.getElementById('preguntasContainer');
            
            container.innerHTML = preguntasActuales.map((pregunta, idx) => `
                <div class="pregunta-card" data-id="${idx}">
                    <div class="pregunta-numero">Pregunta ${idx + 1}</div>
                    <div class="pregunta-texto">${escapeHtml(pregunta.texto)}</div>
                    <div class="senal-emojis">
                        <span style="font-size: 3rem;">${pregunta.emoji}</span>
                        <p style="font-size: 0.7rem; color: #64748b; margin-top: 8px;">${pregunta.emojiDescripcion}</p>
                    </div>
                    <div class="opciones" id="opciones_${idx}">
                        ${pregunta.opciones.map((opcion, optIdx) => `
                            <label class="opcion" data-pregunta="${idx}" data-opcion="${optIdx}">
                                <input type="radio" name="pregunta_${idx}" value="${optIdx}" ${respuestasUsuario[idx] === optIdx ? 'checked' : ''}>
                                <span>${String.fromCharCode(65 + optIdx)}. ${escapeHtml(opcion)}</span>
                            </label>
                        `).join('')}
                    </div>
                    <button class="btn-ver-explicacion" onclick="window.mostrarExplicacion(${idx})">
                        <i class="fas fa-lightbulb"></i> Ver explicación (después del test)
                    </button>
                    <div class="explicacion" id="explicacion_${idx}">
                        <i class="fas fa-info-circle"></i> ${pregunta.explicacion}
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.opcion input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const preguntaIndex = parseInt(e.target.name.split('_')[1]);
                    const valor = parseInt(e.target.value);
                    respuestasUsuario[preguntaIndex] = valor;
                    const respondidas = respuestasUsuario.filter(r => r !== null).length;
                    document.getElementById('respondidas').textContent = respondidas;
                });
            });
        }
        
        window.mostrarExplicacion = function(idx) {
            if (testFinalizado) {
                const explicacionDiv = document.getElementById(`explicacion_${idx}`);
                if (explicacionDiv) explicacionDiv.classList.toggle('mostrar');
            } else {
                alert('Las explicaciones solo están disponibles después de finalizar el test.');
            }
        };
        
        function mostrarToast(mensaje) {
            const toast = document.createElement('div');
            toast.innerHTML = `<div style="position:fixed; bottom:20px; right:20px; background:#10b981; color:white; padding:12px 24px; border-radius:50px; z-index:9999; font-weight:bold; box-shadow:0 4px 15px rgba(0,0,0,0.2);"><i class="fas fa-check-circle"></i> ${mensaje}</div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function finalizarTest() {
            if (testFinalizado) return;
            testFinalizado = true;
            if (timerInterval) clearInterval(timerInterval);
            
            let aciertos = 0;
            const total = preguntasActuales.length;
            
            // Marcar respuestas y contar aciertos
            preguntasActuales.forEach((pregunta, idx) => {
                const respuesta = respuestasUsuario[idx];
                const esCorrecto = (respuesta === pregunta.correcta);
                if (esCorrecto) aciertos++;
                
                const preguntaDiv = document.querySelector(`.pregunta-card[data-id="${idx}"]`);
                if (preguntaDiv) {
                    preguntaDiv.classList.add(esCorrecto ? 'correcta' : 'incorrecta');
                }
                
                const opciones = document.querySelectorAll(`#opciones_${idx} .opcion`);
                opciones.forEach((opcion, optIdx) => {
                    opcion.classList.add('disabled');
                    if (optIdx === pregunta.correcta) {
                        opcion.classList.add('correcta-respuesta');
                    }
                    if (respuesta === optIdx && respuesta !== pregunta.correcta) {
                        opcion.classList.add('incorrecta-respuesta');
                    }
                });
            });
            
            const porcentaje = Math.round((aciertos / total) * 100);
            const aprobado = porcentaje >= 90;
            const resultadoDiv = document.getElementById('resultado');
            
            resultadoDiv.className = `resultado ${aprobado ? 'exito' : 'error'}`;
            resultadoDiv.innerHTML = `
                <i class="fas ${aprobado ? 'fa-trophy' : 'fa-book-open'}" style="font-size: 2.5rem;"></i>
                <h3>${aprobado ? '🎉 ¡Enhorabuena! ¡Has aprobado! 🎉' : '📚 No has aprobado'}</h3>
                <div class="puntuacion-final">${porcentaje}%</div>
                <p>Has acertado <strong>${aciertos}</strong> de <strong>${total}</strong> preguntas</p>
                <p style="color: ${aprobado ? '#10b981' : '#ef4444'}; font-weight: bold;">${aprobado ? '✅ NOTA: APTO' : '❌ NOTA: NO APTO'}</p>
                <button id="btnVolverMenu" style="background: #f5b042; color: #1a472a; border: none; padding: 10px 20px; border-radius: 50px; margin-top: 15px; cursor: pointer;">
                    <i class="fas fa-home"></i> Volver al menú de tests
                </button>
                <button id="btnReintentar" style="background: #64748b; color: white; border: none; padding: 10px 20px; border-radius: 50px; margin-top: 15px; margin-left: 10px; cursor: pointer;">
                    <i class="fas fa-redo"></i> Reintentar
                </button>
            `;
            resultadoDiv.style.display = 'block';
            document.getElementById('btnEnviar').style.display = 'none';
            
            // ✅ GUARDAR RESULTADO EN FIRESTORE
            if (currentUser) {
                await guardarResultadoTest(
                    currentUser.uid,
                    'test-rapido',
                    0,
                    'Test Rápido',
                    {
                        aprobado: aprobado,
                        porcentaje: porcentaje,
                        aciertos: aciertos,
                        total: total
                    }
                );
                mostrarToast(`Test Rápido: ${aprobado ? 'APROBADO' : 'SUSPENDIDO'} (${porcentaje}%)`);
            }
            
            document.getElementById('btnVolverMenu').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
            
            document.getElementById('btnReintentar').addEventListener('click', () => {
                location.reload();
            });
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        document.getElementById('btnEnviar').addEventListener('click', () => {
            if (!testFinalizado && confirm('¿Seguro que quieres finalizar el test?')) {
                finalizarTest();
            }
        });
        
        onAuthStateChanged(auth, (user) => {
            renderUserZone();
            if (!user) {
                window.location.href = '../login.html';
            } else {
                currentUser = user;
                iniciarTest();
            }
        });
        
        document.getElementById('menuMobileBtn')?.addEventListener('click', () => {
            const wrapper = document.getElementById('navWrapper');
            if (wrapper) wrapper.classList.toggle('active');
        });
    </script>
</body>
</html>
