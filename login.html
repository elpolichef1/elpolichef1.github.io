<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AprobadoYa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { max-width: 450px; width: 100%; background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.2); animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .login-header { background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%); color: white; padding: 40px; text-align: center; }
        .login-header i { font-size: 3rem; margin-bottom: 15px; color: #fbbf24; }
        .login-header h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .login-body { padding: 40px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: #fbbf24; box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1); }
        .btn-login { width: 100%; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1a472a; border: none; padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(251, 191, 36, 0.4); }
        .register-link { text-align: center; margin-top: 25px; color: #64748b; }
        .register-link a { color: #fbbf24; text-decoration: none; font-weight: 600; }
        .error-message { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 10px; margin-top: 15px; display: none; text-align: center; }
        .demo-info { margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 12px; text-align: center; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-check-circle"></i>
            <h1>AprobadoYa</h1>
            <p>Inicia sesión para continuar</p>
        </div>
        <div class="login-body">
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Iniciar sesión</button>
                <div id="errorMessage" class="error-message"></div>
            </form>
            <div class="register-link">
                ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
            </div>
            <div class="demo-info">
                <i class="fas fa-info-circle"></i> Cuentas de demo:<br>
                <strong>carlos@email.com</strong> / carlos123 | <strong>ana@email.com</strong> / ana123
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.style.display = 'none';
            
            const result = loginUser(email, password);
            
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                errorDiv.textContent = '❌ Email o contraseña incorrectos';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
