<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Carrera Multijugador | AprobadoYa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2f2a 0%, #061a14 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "🏁";
            position: absolute;
            font-size: 300px;
            opacity: 0.03;
            bottom: -50px;
            right: -50px;
            pointer-events: none;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .game-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        .game-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .game-header h1 i { color: #fbbf24; }
        
        .race-track {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .track {
            position: relative;
            height: 100px;
            background: linear-gradient(180deg, #2a3a24, #1a2a14);
            border-radius: 60px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), 0 2px 5px rgba(0,0,0,0.2);
        }
        .track:last-child { margin-bottom: 0; }
        .track-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(90deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 30px, transparent 30px, transparent 60px);
            pointer-events: none;
        }
        .car {
            position: absolute;
            bottom: 12px;
            left: 0%;
            font-size: 2.5rem;
            transition: left 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.4));
            z-index: 10;
        }
        .car-azul { filter: drop-shadow(2px 4px 8px rgba(0,0,255,0.3)); }
        .car-rojo { filter: drop-shadow(2px 4px 8px rgba(255,0,0,0.3)); }
        .finish-line {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 40px;
            background: repeating-linear-gradient(90deg, #000 0px, #000 15px, #fff 15px, #fff 30px);
            border-radius: 0 60px 60px 0;
            box-shadow: -2px 0 10px rgba(0,0,0,0.3);
        }
        .player-name {
            position: absolute;
            top: -30px;
            left: 15px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.8);
            padding: 4px 16px;
            border-radius: 30px;
            font-weight: 600;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .score-item { text-align: center; flex: 1; }
        .score-value {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .score-label { font-size: 0.7rem; opacity: 0.7; margin-top: 5px; }
        
        .question-card {
            background: white;
            border-radius: 35px;
            padding: 35px;
            color: #1e293b;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 25px;
            line-height: 1.5;
            color: #1a472a;
        }
        .options { display: grid; gap: 12px; }
        .option-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .option-btn:hover:not(.disabled) {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-color: #fbbf24;
            transform: translateX(8px);
        }
        .option-prefix {
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            width: 35px;
        }
        .disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .correct { background: #d1fae5; border-color: #10b981; }
        .incorrect { background: #fee2e2; border-color: #ef4444; }
        
        .turn-indicator {
            text-align: center;
            padding: 14px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a472a;
            border-radius: 60px;
            margin-bottom: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 0.95rem;
        }
        
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .countdown-number {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: bounce 0.5s ease;
        }
        @keyframes bounce {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .countdown-text {
            font-size: 1.2rem;
            margin-top: 20px;
            color: #a8c4b8;
        }
        
        .waiting-message {
            text-align: center;
            padding: 80px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 40px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .resultado-final {
            text-align: center;
            padding: 50px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid rgba(251,191,36,0.3);
        }
        .resultado-final i { font-size: 4rem; margin-bottom: 20px; }
        .resultado-final h2 { margin-bottom: 20px; }
        .btn-reintentar {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a472a;
            border: none;
            padding: 14px 35px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-reintentar:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(251,191,36,0.4); }
        
        @media (max-width: 768px) {
            .car { font-size: 1.8rem; bottom: 10px; }
            .track { height: 80px; }
            .question-text { font-size: 1rem; }
            .score-value { font-size: 1.2rem; }
            .waiting-message { padding: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1><i class="fas fa-flag-checkered"></i> Carrera Multijugador</h1>
        </div>
        <div id="gameContent">
            <div class="waiting-message">
                <div class="spinner"></div>
                <p>Cargando partida...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, getDoc, updateDoc, onSnapshot } from '../../js/firebase-init.js';
        import { renderUserZone } from '../../js/global-auth.js';
        
        // ============================================
        // BASE DE DATOS REAL DE PREGUNTAS DGT
        // ============================================
        const preguntasReales = [
            // TEMA 1: NORMAS GENERALES
            { id: 1, tema: 1, dificultad: "facil", texto: "¿Cuál es la prioridad de paso en una intersección sin señalizar?", opciones: ["La de la izquierda", "La de la derecha", "La del vehículo más rápido", "La del vehículo más grande"], correcta: 1, explicacion: "En las intersecciones sin señalizar, la prioridad la tiene el vehículo que circula por la derecha." },
            { id: 2, tema: 1, dificultad: "facil", texto: "¿Qué documentación es obligatoria llevar en el vehículo?", opciones: ["Permiso de circulación y seguro", "Permiso de conducir y permiso de circulación", "Permiso de conducir, permiso de circulación e ITV en vigor", "Permiso de conducir y seguro"], correcta: 2, explicacion: "Es obligatorio llevar el permiso de conducir, el permiso de circulación y la ITV en vigor." },
            { id: 3, tema: 1, dificultad: "media", texto: "¿Cuál es la tasa máxima de alcoholemia permitida para conductores noveles?", opciones: ["0,5 gramos por litro de sangre", "0,3 gramos por litro de sangre", "0,25 gramos por litro de sangre", "0,0 gramos por litro de sangre"], correcta: 1, explicacion: "Para conductores noveles (primeros 2 años) y profesionales, el límite es de 0,3 g/l en sangre." },
            { id: 4, tema: 1, dificultad: "media", texto: "¿Qué sanción tiene usar el teléfono móvil mientras se conduce?", opciones: ["100€ y 2 puntos", "200€ y 3 puntos", "300€ y 4 puntos", "500€ y 6 puntos"], correcta: 1, explicacion: "Usar el móvil al volante es una infracción grave: 200€ de multa y 3 puntos del carnet." },
            { id: 5, tema: 1, dificultad: "facil", texto: "¿Durante cuánto tiempo es considerado conductor novel?", opciones: ["1 año", "2 años", "3 años", "5 años"], correcta: 1, explicacion: "Se considera conductor novel durante los primeros 2 años desde la obtención del permiso." },
            { id: 6, tema: 1, dificultad: "facil", texto: "¿Qué significa la señal de STOP?", opciones: ["Prohibido el paso", "Ceda el paso", "Detención obligatoria", "Prohibido estacionar"], correcta: 2, explicacion: "La señal de STOP indica detención obligatoria antes de continuar." },
            { id: 7, tema: 1, dificultad: "facil", texto: "¿A qué velocidad máxima puede circular un turismo en autovía?", opciones: ["100 km/h", "110 km/h", "120 km/h", "130 km/h"], correcta: 2, explicacion: "La velocidad máxima para turismos en autovía y autopista es de 120 km/h." },
            { id: 8, tema: 1, dificultad: "facil", texto: "¿Qué debe hacer un conductor al aproximarse a un paso de peatones?", opciones: ["Acelerar para pasar rápido", "Tocar el claxon", "Reducir la velocidad y ceder el paso", "Estacionar antes del paso"], correcta: 2, explicacion: "Debe reducir la velocidad y ceder el paso a los peatones que crucen o vayan a cruzar." },
            { id: 9, tema: 1, dificultad: "media", texto: "¿Qué indica una línea continua en la calzada?", opciones: ["Prohibido adelantar", "Prohibido estacionar", "Sentido prohibido", "Zona de carga"], correcta: 0, explicacion: "La línea continua prohíbe adelantar y cruzar sobre ella." },
            { id: 10, tema: 1, dificultad: "facil", texto: "¿Cuándo está permitido usar el claxon?", opciones: ["Siempre que se quiera", "Para saludar a conocidos", "Para evitar un accidente", "En zonas urbanas siempre"], correcta: 2, explicacion: "El claxon solo debe usarse para evitar un accidente o en casos de emergencia." },
            { id: 11, tema: 1, dificultad: "media", texto: "¿Qué deben hacer los conductores al aproximarse a un paso a nivel?", opciones: ["Aumentar la velocidad", "Detenerse siempre", "Reducir la velocidad y extremar la precaución", "Tocar el claxon"], correcta: 2, explicacion: "Deben reducir la velocidad y extremar la precaución al aproximarse a un paso a nivel." },
            { id: 12, tema: 1, dificultad: "media", texto: "¿Qué significa la señal de 'Ceda el paso'?", opciones: ["Obligación de detenerse", "Preferencia de paso", "Prohibido el paso", "Obligación de ceder el paso a otros vehículos"], correcta: 3, explicacion: "Indica la obligación de ceder el paso a los vehículos que circulan por la vía a la que se aproxima." },
            { id: 13, tema: 1, dificultad: "dificil", texto: "¿Qué se entiende por 'conducción negligente'?", opciones: ["Conducir a velocidad moderada", "Conducir sin la atención y diligencia debidas", "Conducir sin documentos", "Conducir con exceso de equipaje"], correcta: 1, explicacion: "Es conducir sin la atención y diligencia necesarias, poniendo en riesgo la seguridad vial." },
            { id: 14, tema: 1, dificultad: "media", texto: "¿Cuántos puntos tiene inicialmente un conductor novel?", opciones: ["12 puntos", "10 puntos", "8 puntos", "6 puntos"], correcta: 2, explicacion: "Los conductores noveles disponen inicialmente de 8 puntos." },
            { id: 15, tema: 1, dificultad: "dificil", texto: "¿Qué documentación NO es obligatoria llevar en el vehículo?", opciones: ["Permiso de circulación", "Tarjeta de la ITV", "Justificante del último pago del impuesto de circulación", "Permiso de conducir"], correcta: 2, explicacion: "El justificante del impuesto de circulación no es obligatorio llevarlo en el vehículo." },
            { id: 16, tema: 1, dificultad: "media", texto: "¿Qué significa una señal circular con fondo rojo y una franja blanca horizontal?", opciones: ["Prohibido girar a la izquierda", "Prohibido el paso", "Prohibido adelantar", "Prohibido estacionar"], correcta: 1, explicacion: "Es la señal de prohibido el paso." },
            { id: 17, tema: 1, dificultad: "facil", texto: "¿Dónde se debe circular normalmente en una vía de doble sentido?", opciones: ["Por el carril izquierdo", "Por el carril derecho", "Por el centro", "Por el arcén"], correcta: 1, explicacion: "Se debe circular por el carril derecho, dejando el izquierdo para adelantamientos." },
            { id: 18, tema: 1, dificultad: "media", texto: "¿Qué significa la luz amarilla intermitente de un semáforo?", opciones: ["Paso prohibido", "Paso obligatorio", "Precaución, prioridad de paso", "Fin de prohibición"], correcta: 2, explicacion: "Indica precaución y que se debe ceder el paso." },
            { id: 19, tema: 1, dificultad: "dificil", texto: "¿Qué se considera conducción temeraria?", opciones: ["Conducir a más de 80 km/h", "Conducir sin cinturón", "Conducir con manifiesto desprecio por la vida de los demás", "Conducir sin luces"], correcta: 2, explicacion: "Es un delito contra la seguridad vial que conlleva penas de prisión." },
            { id: 20, tema: 1, dificultad: "media", texto: "¿Cuándo debe un conductor encender las luces de cruce?", opciones: ["Solo de noche", "Solo en túneles", "Desde el atardecer hasta el amanecer y en túneles", "Solo cuando llueve"], correcta: 2, explicacion: "Debe encender las luces de cruce desde el atardecer hasta el amanecer y en túneles o condiciones adversas." },
            { id: 21, tema: 1, dificultad: "media", texto: "¿Qué significa la señal de 'Calle residencial'?", opciones: ["Velocidad máxima 30 km/h", "Velocidad máxima 20 km/h", "Prioridad de los peatones", "Todas son correctas"], correcta: 3, explicacion: "En zona residencial la velocidad máxima es 20 km/h y los peatones tienen prioridad." },
            { id: 22, tema: 1, dificultad: "facil", texto: "¿Qué debe hacer un conductor si un agente de tráfico le indica que se detenga?", opciones: ["Acelerar para pasar", "Detenerse inmediatamente", "Buscar un lugar seguro para detenerse", "Continuar y detenerse después"], correcta: 1, explicacion: "Debe detenerse inmediatamente siguiendo las indicaciones del agente." },
            { id: 23, tema: 1, dificultad: "media", texto: "¿Qué sanción tiene no llevar el cinturón de seguridad?", opciones: ["100€", "200€ y 3 puntos", "500€", "100€ y 2 puntos"], correcta: 1, explicacion: "Es una infracción grave: 200€ de multa y 3 puntos." },
            { id: 24, tema: 1, dificultad: "facil", texto: "¿Qué indica una señal de 'Prohibido adelantar'?", opciones: ["Prohibido adelantar a cualquier vehículo", "Prohibido adelantar a motocicletas", "Prohibido adelantar a ciclistas", "Prohibido cambiar de carril"], correcta: 0, explicacion: "Prohíbe adelantar a cualquier vehículo en ese tramo." },
            { id: 25, tema: 1, dificultad: "media", texto: "¿Qué debe hacer un conductor si se aproxima a un autobús escolar detenido?", opciones: ["Aumentar la velocidad", "Adelantar con precaución", "Reducir velocidad y detenerse si es necesario", "Tocar el claxon"], correcta: 2, explicacion: "Debe reducir la velocidad y detenerse si es necesario para garantizar la seguridad de los niños." },
            
            // TEMA 2: SEÑALES DE TRÁFICO
            { id: 26, tema: 2, dificultad: "facil", texto: "¿Qué color tienen las señales de servicio (hospital, gasolinera)?", opciones: ["Azul", "Verde", "Amarillo", "Rojo"], correcta: 0, explicacion: "Las señales de servicio son de color azul." },
            { id: 27, tema: 2, dificultad: "facil", texto: "¿Qué indica una señal triangular con borde rojo y fondo blanco?", opciones: ["Prohibición", "Obligación", "Peligro", "Información"], correcta: 2, explicacion: "Las señales triangulares con borde rojo indican peligro." },
            { id: 28, tema: 2, dificultad: "facil", texto: "¿Qué indica una señal circular de fondo azul con una flecha blanca hacia arriba?", opciones: ["Prohibido girar", "Dirección obligatoria", "Carril exclusivo", "Zona peatonal"], correcta: 1, explicacion: "Indica dirección obligatoria hacia donde apunta la flecha." },
            { id: 29, tema: 2, dificultad: "media", texto: "¿Qué significa una línea continua amarilla en el bordillo?", opciones: ["Prohibido estacionar", "Prohibido parar", "Zona de carga", "Parada de autobús"], correcta: 1, explicacion: "La línea continua amarilla en el bordillo indica prohibido parar y estacionar." },
            { id: 30, tema: 2, dificultad: "facil", texto: "¿Qué señal indica 'Ceda el paso'?", opciones: ["Triángulo invertido con borde rojo", "Círculo rojo", "Octógono rojo", "Cuadrado azul"], correcta: 0, explicacion: "La señal de ceda el paso es un triángulo invertido con borde rojo y fondo blanco." },
            { id: 31, tema: 2, dificultad: "media", texto: "¿Qué indica una señal redonda con fondo rojo y un número?", opciones: ["Velocidad máxima", "Velocidad mínima", "Prohibición de circular a más de esa velocidad", "Fin de prohibición"], correcta: 2, explicacion: "Indica la velocidad máxima permitida, no se puede circular a más de esa velocidad." },
            { id: 32, tema: 2, dificultad: "facil", texto: "¿Qué color tienen las señales de autopista?", opciones: ["Azul", "Verde", "Amarillo", "Rojo"], correcta: 1, explicacion: "Las señales de autopista y autovía son de fondo verde." },
            { id: 33, tema: 2, dificultad: "facil", texto: "¿Qué significa una línea discontinua en la calzada?", opciones: ["Prohibido adelantar", "Permite adelantar si es seguro", "Prohibido cambiar de carril", "Zona de estacionamiento"], correcta: 1, explicacion: "La línea discontinua permite adelantar o cambiar de carril si es seguro." },
            { id: 34, tema: 2, dificultad: "media", texto: "¿Qué indica una señal de 'Paso a nivel sin barreras'?", opciones: ["Paso a nivel con barreras", "Paso a nivel sin barreras", "Paso inferior", "Paso superior"], correcta: 1, explicacion: "Indica un paso a nivel sin barreras, con especial precaución." },
            { id: 35, tema: 2, dificultad: "facil", texto: "¿Qué significa la señal de 'Prohibido estacionar'?", opciones: ["No se puede parar", "No se puede estacionar", "No se puede circular", "Zona de carga"], correcta: 1, explicacion: "Prohíbe estacionar, pero permite paradas breves." },
            { id: 36, tema: 2, dificultad: "media", texto: "¿Qué indica una señal de 'Zona escolar'?", opciones: ["Proximidad de un colegio", "Velocidad máxima 20 km/h", "Precaución con niños", "Todas son correctas"], correcta: 3, explicacion: "Indica proximidad de colegio, velocidad reducida y precaución con niños." },
            { id: 37, tema: 2, dificultad: "facil", texto: "¿Qué indican las señales de color naranja?", opciones: ["Obras", "Servicios", "Peligro", "Información turística"], correcta: 0, explicacion: "Las señales de color naranja indican obras o situaciones temporales." },
            { id: 38, tema: 2, dificultad: "facil", texto: "¿Qué indica una señal de 'Prohibido entrar'?", opciones: ["Prohibido el paso", "Prohibido girar", "Prohibido estacionar", "Prohibido adelantar"], correcta: 0, explicacion: "Prohíbe la entrada a una vía." },
            { id: 39, tema: 2, dificultad: "facil", texto: "¿Qué significa una señal de 'Senda ciclista'?", opciones: ["Vía para bicicletas", "Prohibido circular en bicicleta", "Carril bici", "Zona peatonal"], correcta: 0, explicacion: "Indica una vía reservada para bicicletas." },
            { id: 40, tema: 2, dificultad: "media", texto: "¿Qué indica una señal de 'Estacionamiento regulado'?", opciones: ["Estacionamiento con parquímetro", "Estacionamiento limitado", "Zona azul o verde", "Todas son correctas"], correcta: 3, explicacion: "Indica zona de estacionamiento regulado con limitación horaria." },
            
            // TEMA 3: CIRCULACIÓN
            { id: 41, tema: 3, dificultad: "facil", texto: "¿Dónde debe circular un turismo en una autovía?", opciones: ["Por el carril izquierdo", "Por el carril derecho", "Por el carril central", "Por el arcén"], correcta: 1, explicacion: "Debe circular por el carril derecho, dejando el izquierdo para adelantar." },
            { id: 42, tema: 3, dificultad: "facil", texto: "¿Cuándo está permitido utilizar el carril izquierdo en autovía?", opciones: ["Siempre", "Para circular a máxima velocidad", "Para adelantar", "Para circular en sentido contrario"], correcta: 2, explicacion: "El carril izquierdo se utiliza exclusivamente para adelantar." },
            { id: 43, tema: 3, dificultad: "media", texto: "¿Qué velocidad máxima pueden alcanzar las motocicletas en autovía?", opciones: ["100 km/h", "110 km/h", "120 km/h", "130 km/h"], correcta: 2, explicacion: "Las motocicletas pueden circular a 120 km/h en autovía." },
            { id: 44, tema: 3, dificultad: "facil", texto: "¿Cuál es la velocidad máxima en carretera convencional para un turismo?", opciones: ["80 km/h", "90 km/h", "100 km/h", "110 km/h"], correcta: 1, explicacion: "En carretera convencional, la velocidad máxima para turismos es de 90 km/h." },
            { id: 45, tema: 3, dificultad: "media", texto: "¿Cuál es la velocidad máxima en zona residencial?", opciones: ["20 km/h", "30 km/h", "40 km/h", "50 km/h"], correcta: 0, explicacion: "En zonas residenciales la velocidad máxima es de 20 km/h." },
            { id: 46, tema: 3, dificultad: "facil", texto: "¿Qué debe hacer un conductor al aproximarse a una rotonda?", opciones: ["Ceder el paso a los vehículos que circulan en ella", "Tener prioridad siempre", "Acelerar para entrar", "Detenerse siempre"], correcta: 0, explicacion: "Debe ceder el paso a los vehículos que ya circulan por la rotonda." },
            { id: 47, tema: 3, dificultad: "facil", texto: "¿Está permitido adelantar en un paso de peatones?", opciones: ["Sí, si no hay peatones", "Sí, con precaución", "No, está prohibido", "Solo en vías urbanas"], correcta: 2, explicacion: "Está prohibido adelantar en los pasos de peatones." },
            { id: 48, tema: 3, dificultad: "media", texto: "¿Está permitido adelantar en una curva sin visibilidad?", opciones: ["Sí, con precaución", "Sí, si no viene nadie", "No, está prohibido", "Solo de noche"], correcta: 2, explicacion: "Está prohibido adelantar en curvas sin visibilidad." },
            { id: 49, tema: 3, dificultad: "facil", texto: "¿Qué distancia de seguridad debe mantener un turismo?", opciones: ["1 segundo", "2 segundos", "3 segundos", "4 segundos"], correcta: 1, explicacion: "La distancia de seguridad recomendada es de 2 segundos con el vehículo delantero." },
            { id: 50, tema: 3, dificultad: "facil", texto: "¿Está permitido circular marcha atrás en autovía?", opciones: ["Sí, si es necesario", "Sí, para estacionar", "No, está prohibido", "Solo en caso de emergencia"], correcta: 2, explicacion: "Está totalmente prohibido circular marcha atrás en autovías y autopistas." }
        ];

        let salaId = null;
        let currentUser = null;
        let salaData = null;
        let esJugador1 = false;
        let respuestaSeleccionada = false;
        let gameActivo = true;
        let unsubscribe = null;
        let juegoIniciado = false;
        
        function obtenerPreguntaAleatoria() {
            return preguntasReales[Math.floor(Math.random() * preguntasReales.length)];
        }
        
        function mostrarCuentaAtras() {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'countdown-overlay';
                overlay.innerHTML = `<div class="countdown-number" id="countdownNum">3</div><div class="countdown-text">Preparados...</div>`;
                document.body.appendChild(overlay);
                let count = 3;
                const interval = setInterval(() => {
                    count--;
                    if (count >= 1) {
                        const num = document.getElementById('countdownNum');
                        const text = overlay.querySelector('.countdown-text');
                        num.textContent = count;
                        text.textContent = count === 2 ? "Listos..." : "¡YA!";
                        num.style.animation = 'none';
                        setTimeout(() => num.style.animation = 'bounce 0.5s ease', 10);
                    } else {
                        clearInterval(interval);
                        overlay.remove();
                        resolve();
                    }
                }, 1000);
            });
        }
        
        async function iniciarJuego() {
            const preguntas = [];
            for (let i = 0; i < 7; i++) {
                preguntas.push(obtenerPreguntaAleatoria());
            }
            await updateDoc(doc(db, "partidas_multijugador", salaId), {
                preguntas: preguntas,
                turno: 0,
                puntuacion1: 0,
                puntuacion2: 0
            });
            console.log("✅ Juego iniciado con", preguntas.length, "preguntas reales de la DGT");
        }
        
        async function responder(respuesta) {
            if (!gameActivo || respuestaSeleccionada) return;
            if (!salaData || salaData.turno !== (esJugador1 ? 0 : 1)) return;
            
            respuestaSeleccionada = true;
            const pregunta = salaData.preguntas[salaData.turno];
            const esCorrecto = (respuesta === pregunta.correcta);
            
            const opciones = document.querySelectorAll('.option-btn');
            opciones.forEach((btn, idx) => {
                btn.classList.add('disabled');
                if (idx === pregunta.correcta) btn.classList.add('correct');
                if (idx === respuesta && respuesta !== pregunta.correcta) btn.classList.add('incorrect');
            });
            
            const nuevaP1 = salaData.puntuacion1 + (esJugador1 && esCorrecto ? 1 : 0);
            const nuevaP2 = salaData.puntuacion2 + (!esJugador1 && esCorrecto ? 1 : 0);
            const nuevoTurno = salaData.turno + 1;
            
            await updateDoc(doc(db, "partidas_multijugador", salaId), {
                puntuacion1: nuevaP1,
                puntuacion2: nuevaP2,
                turno: nuevoTurno
            });
            
            if (nuevoTurno >= salaData.preguntas.length) {
                setTimeout(() => finalizarJuego(), 1500);
            } else {
                respuestaSeleccionada = false;
            }
        }
        
        function renderizarJuego() {
            if (!salaData || !salaData.preguntas) return;
            
            const p1 = salaData.puntuacion1 || 0;
            const p2 = salaData.puntuacion2 || 0;
            const total = salaData.preguntas.length;
            const turno = salaData.turno;
            
            if (turno >= total) { finalizarJuego(); return; }
            
            const pregunta = salaData.preguntas[turno];
            const esMiTurno = (turno === (esJugador1 ? 0 : 1));
            const avance1 = (p1 / total) * 100;
            const avance2 = (p2 / total) * 100;
            
            document.getElementById('gameContent').innerHTML = `
                <div class="race-track">
                    <div class="track">
                        <div class="track-lines"></div>
                        <div class="player-name">🏎️ ${salaData.jugador1Nombre}</div>
                        <div class="car car-azul" style="left: ${Math.min(avance1, 96)}%">🏎️</div>
                        <div class="finish-line"></div>
                    </div>
                    <div class="track">
                        <div class="track-lines"></div>
                        <div class="player-name">🏎️ ${salaData.jugador2Nombre}</div>
                        <div class="car car-rojo" style="left: ${Math.min(avance2, 96)}%">🏎️</div>
                        <div class="finish-line"></div>
                    </div>
                </div>
                <div class="score-board">
                    <div class="score-item"><div class="score-value">${p1}</div><div class="score-label">🏎️ ${salaData.jugador1Nombre}</div></div>
                    <div class="score-item"><div class="score-value">${turno+1}/${total}</div><div class="score-label">📝 Pregunta</div></div>
                    <div class="score-item"><div class="score-value">${p2}</div><div class="score-label">🏎️ ${salaData.jugador2Nombre}</div></div>
                </div>
                ${!esMiTurno ? '<div class="turn-indicator"><i class="fas fa-hourglass-half"></i> Esperando respuesta del oponente...</div>' : ''}
                <div class="question-card">
                    <div class="question-text">${pregunta.texto}</div>
                    <div class="options" id="options">
                        ${pregunta.opciones.map((opt, idx) => `
                            <div class="option-btn" data-opcion="${idx}">
                                <span class="option-prefix">${String.fromCharCode(65+idx)}.</span>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            if (esMiTurno && gameActivo) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', () => responder(parseInt(btn.dataset.opcion)));
                });
            } else {
                document.querySelectorAll('.option-btn').forEach(btn => btn.classList.add('disabled'));
            }
        }
        
        async function finalizarJuego() {
            gameActivo = false;
            const p1 = salaData.puntuacion1 || 0;
            const p2 = salaData.puntuacion2 || 0;
            const ganador = p1 > p2 ? salaData.jugador1Nombre : (p2 > p1 ? salaData.jugador2Nombre : "Empate");
            const esGanador = (p1 > p2 && esJugador1) || (p2 > p1 && !esJugador1);
            
            document.getElementById('gameContent').innerHTML = `
                <div class="resultado-final">
                    <i class="fas ${esGanador ? 'fa-trophy' : 'fa-flag-checkered'}" style="color: #fbbf24;"></i>
                    <h2>🏁 ¡PARTIDA FINALIZADA! 🏁</h2>
                    <div style="background: rgba(0,0,0,0.3); border-radius: 25px; padding: 20px; margin: 20px 0;">
                        <p><strong>🏎️ ${salaData.jugador1Nombre}</strong>: ${p1} puntos</p>
                        <p><strong>🏎️ ${salaData.jugador2Nombre}</strong>: ${p2} puntos</p>
                        <div style="height: 2px; background: rgba(255,255,255,0.2); margin: 15px 0;"></div>
                        <h3 style="background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; background-clip: text; color: transparent;">${ganador === "Empate" ? "🤝 ¡EMPATE! 🤝" : (esGanador ? "🎉 ¡HAS GANADO! 🎉" : `🏆 ¡GANÓ ${ganador}! 🏆`)}</h3>
                    </div>
                    <button class="btn-reintentar" onclick="window.location.href='lobby.html'"><i class="fas fa-redo"></i> Jugar de nuevo</button>
                    <a href="../index.html" style="display: inline-block; margin-left: 15px; background: rgba(255,255,255,0.15); color: white; padding: 14px 35px; border-radius: 60px; text-decoration: none; transition: 0.3s;">Volver al menú</a>
                </div>
            `;
            if (unsubscribe) unsubscribe();
        }
        
        async function cargarPartida() {
            const salaRef = doc(db, "partidas_multijugador", salaId);
            const salaDoc = await getDoc(salaRef);
            if (!salaDoc.exists()) { window.location.href = 'lobby.html'; return; }
            
            salaData = salaDoc.data();
            esJugador1 = salaData.jugador1 === currentUser.uid;
            
            if (salaData.estado === "esperando") {
                document.getElementById('gameContent').innerHTML = `<div class="waiting-message"><div class="spinner"></div><p>⏳ Esperando oponente...</p></div>`;
            } else if (salaData.estado === "en_curso") {
                if (!salaData.preguntas) {
                    document.getElementById('gameContent').innerHTML = `<div class="waiting-message"><div class="spinner"></div><p>🎮 Preparando partida...</p></div>`;
                    await iniciarJuego();
                    await mostrarCuentaAtras();
                    const updatedDoc = await getDoc(salaRef);
                    salaData = updatedDoc.data();
                    renderizarJuego();
                } else {
                    await mostrarCuentaAtras();
                    renderizarJuego();
                }
            }
            
            unsubscribe = onSnapshot(salaRef, (doc) => {
                if (doc.exists()) {
                    const newData = doc.data();
                    if (newData.preguntas && (!salaData.preguntas || salaData.turno !== newData.turno)) {
                        salaData = newData;
                        if (salaData.preguntas && gameActivo) {
                            renderizarJuego();
                        }
                    }
                }
            });
        }
        
        onAuthStateChanged(auth, async (user) => {
            renderUserZone();
            if (!user) { window.location.href = '../../login.html'; return; }
            currentUser = user;
            const urlParams = new URLSearchParams(window.location.search);
            salaId = urlParams.get('sala');
            if (!salaId) { window.location.href = 'lobby.html'; return; }
            await cargarPartida();
        });
    </script>
</body>
