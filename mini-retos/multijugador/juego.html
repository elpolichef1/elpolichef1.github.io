<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Carrera Multijugador | AprobadoYa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2f2a 0%, #061a14 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .game-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .race-track {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 30px;
            margin-bottom: 25px;
        }
        .track {
            position: relative;
            height: 100px;
            background: linear-gradient(180deg, #2a3a24, #1a2a14);
            border-radius: 60px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .track:last-child { margin-bottom: 0; }
        .track-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(90deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 30px, transparent 30px, transparent 60px);
        }
        .car {
            position: absolute;
            bottom: 12px;
            left: 0%;
            font-size: 2.5rem;
            transition: left 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.4));
            z-index: 10;
        }
        .finish-line {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 40px;
            background: repeating-linear-gradient(90deg, #000 0px, #000 15px, #fff 15px, #fff 30px);
            border-radius: 0 60px 60px 0;
        }
        .player-name {
            position: absolute;
            top: -30px;
            left: 15px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.8);
            padding: 4px 16px;
            border-radius: 30px;
        }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 25px;
        }
        .score-item { text-align: center; flex: 1; }
        .score-value { font-size: 1.8rem; font-weight: 800; color: #fbbf24; }
        .score-label { font-size: 0.7rem; opacity: 0.7; }
        
        .question-card {
            background: white;
            border-radius: 35px;
            padding: 35px;
            color: #1e293b;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #1a472a;
        }
        .options { display: grid; gap: 12px; }
        .option-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .option-btn:hover:not(.disabled) {
            background: #fef3c7;
            border-color: #fbbf24;
            transform: translateX(8px);
        }
        .option-prefix { font-weight: 800; color: #fbbf24; width: 35px; }
        .disabled { opacity: 0.6; cursor: not-allowed; }
        .correct { background: #d1fae5; border-color: #10b981; }
        .incorrect { background: #fee2e2; border-color: #ef4444; }
        
        .turn-indicator {
            text-align: center;
            padding: 14px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a472a;
            border-radius: 60px;
            margin-bottom: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .timer-bar {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }
        .timer-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .countdown-number {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: bounce 0.5s ease;
        }
        @keyframes bounce {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .resultado-final {
            text-align: center;
            padding: 50px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 40px;
        }
        .btn-reintentar {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a472a;
            border: none;
            padding: 14px 35px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .car { font-size: 1.8rem; bottom: 10px; }
            .track { height: 80px; }
            .question-text { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1><i class="fas fa-flag-checkered"></i> Carrera Multijugador</h1>
        </div>
        <div id="gameContent">
            <div style="text-align:center; padding:80px;">
                <div style="width:60px; height:60px; border:4px solid rgba(255,255,255,0.15); border-top-color:#fbbf24; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 25px;"></div>
                <p>Cargando partida...</p>
            </div>
        </div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, getDoc, updateDoc, onSnapshot } from '../../js/firebase-init.js';
        import { renderUserZone } from '../../js/global-auth.js';
        
        // ============================================
        // IMPORTAR PREGUNTAS REALES DE LA DGT
        // ============================================
        // Usamos preguntas-reales.js con más de 500 preguntas realistas
        import { preguntasReales } from '../../test/data/preguntas-reales.js';
        
        // Configuración del juego
        const TOTAL_PREGUNTAS = 10;      // Número de preguntas por partida
        const TIEMPO_RESPUESTA = 15000;  // 15 segundos por pregunta
        
        // Variables globales
        let salaId = null;
        let currentUser = null;
        let salaData = null;
        let esJugador1 = false;
        let respuestaSeleccionada = false;
        let gameActivo = true;
        let unsubscribe = null;
        let timerInterval = null;
        let procesandoRespuesta = false;
        
        // ============================================
        // FUNCIÓN PARA SELECCIONAR PREGUNTAS ALEATORIAS
        // ============================================
        function seleccionarPreguntasAleatorias(cantidad) {
            if (!preguntasReales || preguntasReales.length === 0) {
                console.error("No hay preguntas disponibles");
                return [];
            }
            
            // Mezclar todas las preguntas
            const mezcladas = [...preguntasReales];
            for (let i = mezcladas.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [mezcladas[i], mezcladas[j]] = [mezcladas[j], mezcladas[i]];
            }
            
            // Seleccionar las primeras 'cantidad' preguntas
            const seleccionadas = mezcladas.slice(0, cantidad).map(p => ({
                texto: p.texto,
                opciones: [...p.opciones],
                correcta: p.correcta,
                explicacion: p.explicacion || "Respuesta correcta."
            }));
            
            console.log(`✅ Seleccionadas ${seleccionadas.length} preguntas aleatorias de ${preguntasReales.length} totales`);
            return seleccionadas;
        }
        
        // ============================================
        // FUNCIONES DEL JUEGO
        // ============================================
        function iniciarTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            const timerFill = document.getElementById('timerFill');
            if (!timerFill) return;
            
            const startTime = Date.now();
            
            timerInterval = setInterval(() => {
                if (!gameActivo) return;
                const elapsed = Date.now() - startTime;
                const remaining = Math.max(0, TIEMPO_RESPUESTA - elapsed);
                const percent = (remaining / TIEMPO_RESPUESTA) * 100;
                
                if (timerFill) timerFill.style.width = `${percent}%`;
                
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    if (!respuestaSeleccionada && gameActivo && !procesandoRespuesta) {
                        manejarTimeout();
                    }
                }
            }, 100);
        }
        
        async function manejarTimeout() {
            if (!gameActivo || respuestaSeleccionada || procesandoRespuesta) return;
            if (!salaData) return;
            
            procesandoRespuesta = true;
            
            const turnoActual = salaData.turno;
            const esMiTurno = (turnoActual === (esJugador1 ? 0 : 1));
            
            if (!esMiTurno) {
                procesandoRespuesta = false;
                return;
            }
            
            respuestaSeleccionada = true;
            
            const nuevoTurno = turnoActual + 1;
            
            try {
                await updateDoc(doc(db, "partidas_multijugador", salaId), {
                    turno: nuevoTurno,
                    ultimoRespuesta: Date.now()
                });
            } catch (error) {
                console.error("Error en timeout:", error);
            }
            
            procesandoRespuesta = false;
            if (timerInterval) clearInterval(timerInterval);
        }
        
        function mostrarCuentaAtras() {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'countdown-overlay';
                overlay.innerHTML = `<div class="countdown-number" id="countdownNum">3</div><div class="countdown-text">Preparados...</div>`;
                document.body.appendChild(overlay);
                let count = 3;
                const interval = setInterval(() => {
                    count--;
                    if (count >= 1) {
                        const num = document.getElementById('countdownNum');
                        const text = overlay.querySelector('.countdown-text');
                        if (num) num.textContent = count;
                        if (text) text.textContent = count === 2 ? "Listos..." : "¡YA!";
                    } else {
                        clearInterval(interval);
                        overlay.remove();
                        resolve();
                    }
                }, 1000);
            });
        }
        
        async function iniciarJuego() {
            // Seleccionar preguntas aleatorias de tu base de datos real
            const preguntasSeleccionadas = seleccionarPreguntasAleatorias(TOTAL_PREGUNTAS);
            
            if (preguntasSeleccionadas.length === 0) {
                console.error("No se pudieron seleccionar preguntas");
                return;
            }
            
            await updateDoc(doc(db, "partidas_multijugador", salaId), {
                preguntas: preguntasSeleccionadas,
                turno: 0,
                puntuacion1: 0,
                puntuacion2: 0,
                estado: "jugando",
                iniciado: true
            });
        }
        
        async function responder(respuesta) {
            if (!gameActivo || respuestaSeleccionada || procesandoRespuesta) return;
            if (!salaData) return;
            if (salaData.turno !== (esJugador1 ? 0 : 1)) return;
            
            procesandoRespuesta = true;
            respuestaSeleccionada = true;
            
            if (timerInterval) clearInterval(timerInterval);
            
            const pregunta = salaData.preguntas[salaData.turno];
            if (!pregunta) {
                procesandoRespuesta = false;
                return;
            }
            
            const esCorrecto = (respuesta === pregunta.correcta);
            
            // Marcar visualmente
            const opciones = document.querySelectorAll('.option-btn');
            opciones.forEach((btn, idx) => {
                btn.classList.add('disabled');
                if (idx === pregunta.correcta) btn.classList.add('correct');
                if (idx === respuesta && respuesta !== pregunta.correcta) btn.classList.add('incorrect');
            });
            
            const nuevaP1 = salaData.puntuacion1 + (esJugador1 && esCorrecto ? 1 : 0);
            const nuevaP2 = salaData.puntuacion2 + (!esJugador1 && esCorrecto ? 1 : 0);
            const nuevoTurno = salaData.turno + 1;
            
            try {
                await updateDoc(doc(db, "partidas_multijugador", salaId), {
                    puntuacion1: nuevaP1,
                    puntuacion2: nuevaP2,
                    turno: nuevoTurno,
                    ultimoRespuesta: Date.now()
                });
            } catch (error) {
                console.error("Error al responder:", error);
            }
            
            procesandoRespuesta = false;
            
            if (nuevoTurno >= TOTAL_PREGUNTAS) {
                setTimeout(() => finalizarJuego(), 2000);
            }
        }
        
        function renderizarJuego() {
            if (!salaData || !salaData.preguntas) return;
            
            const p1 = salaData.puntuacion1 || 0;
            const p2 = salaData.puntuacion2 || 0;
            const turno = salaData.turno;
            
            if (turno >= TOTAL_PREGUNTAS) {
                finalizarJuego();
                return;
            }
            
            const pregunta = salaData.preguntas[turno];
            if (!pregunta) return;
            
            const esMiTurno = (turno === (esJugador1 ? 0 : 1));
            const avance1 = (p1 / TOTAL_PREGUNTAS) * 100;
            const avance2 = (p2 / TOTAL_PREGUNTAS) * 100;
            
            const coche1 = salaData.jugador1Coche || '🏎️';
            const coche2 = salaData.jugador2Coche || '🏎️';
            
            document.getElementById('gameContent').innerHTML = `
                <div class="race-track">
                    <div class="track">
                        <div class="track-lines"></div>
                        <div class="player-name">${coche1} ${escapeHtml(salaData.jugador1Nombre || 'Jugador 1')}</div>
                        <div class="car" style="left: ${Math.min(avance1, 96)}%">${coche1}</div>
                        <div class="finish-line"></div>
                    </div>
                    <div class="track">
                        <div class="track-lines"></div>
                        <div class="player-name">${coche2} ${escapeHtml(salaData.jugador2Nombre || 'Jugador 2')}</div>
                        <div class="car" style="left: ${Math.min(avance2, 96)}%">${coche2}</div>
                        <div class="finish-line"></div>
                    </div>
                </div>
                <div class="score-board">
                    <div class="score-item"><div class="score-value">${p1}</div><div class="score-label">${escapeHtml(salaData.jugador1Nombre || 'Jugador 1')}</div></div>
                    <div class="score-item"><div class="score-value">${turno+1}/${TOTAL_PREGUNTAS}</div><div class="score-label">Pregunta</div></div>
                    <div class="score-item"><div class="score-value">${p2}</div><div class="score-label">${escapeHtml(salaData.jugador2Nombre || 'Jugador 2')}</div></div>
                </div>
                ${!esMiTurno ? '<div class="turn-indicator"><i class="fas fa-hourglass-half"></i> Esperando respuesta del rival...</div>' : 
                    '<div class="turn-indicator"><i class="fas fa-clock"></i> ¡Tu turno! Responde antes de 15 segundos<div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div></div>'}
                <div class="question-card">
                    <div class="question-text">${escapeHtml(pregunta.texto)}</div>
                    <div class="options" id="options">
                        ${pregunta.opciones.map((opt, idx) => `
                            <div class="option-btn" data-opcion="${idx}">
                                <span class="option-prefix">${String.fromCharCode(65+idx)}.</span>
                                <span>${escapeHtml(opt)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            respuestaSeleccionada = false;
            
            if (esMiTurno && gameActivo) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', () => responder(parseInt(btn.dataset.opcion)));
                });
                iniciarTimer();
            } else {
                const opts = document.querySelectorAll('.option-btn');
                if (opts) opts.forEach(btn => btn.classList.add('disabled'));
            }
        }
        
        async function finalizarJuego() {
            gameActivo = false;
            if (timerInterval) clearInterval(timerInterval);
            if (unsubscribe) unsubscribe();
            
            const p1 = salaData?.puntuacion1 || 0;
            const p2 = salaData?.puntuacion2 || 0;
            const nombre1 = salaData?.jugador1Nombre || 'Jugador 1';
            const nombre2 = salaData?.jugador2Nombre || 'Jugador 2';
            const ganador = p1 > p2 ? nombre1 : (p2 > p1 ? nombre2 : "Empate");
            const esGanador = (p1 > p2 && esJugador1) || (p2 > p1 && !esJugador1);
            
            document.getElementById('gameContent').innerHTML = `
                <div class="resultado-final">
                    <i class="fas ${esGanador ? 'fa-trophy' : 'fa-flag-checkered'}" style="font-size: 4rem; color: #fbbf24;"></i>
                    <h2 style="margin: 20px 0;">🏁 ¡PARTIDA FINALIZADA! 🏁</h2>
                    <div style="background: rgba(0,0,0,0.3); border-radius: 25px; padding: 20px; margin: 20px 0;">
                        <p><strong>${escapeHtml(nombre1)}</strong>: ${p1} puntos</p>
                        <p><strong>${escapeHtml(nombre2)}</strong>: ${p2} puntos</p>
                        <div style="height: 2px; background: rgba(255,255,255,0.2); margin: 15px 0;"></div>
                        <h3 style="color: #fbbf24;">${ganador === "Empate" ? "🤝 ¡EMPATE! 🤝" : (esGanador ? "🎉 ¡HAS GANADO! 🎉" : `🏆 GANÓ ${escapeHtml(ganador)} 🏆`)}</h3>
                    </div>
                    <button class="btn-reintentar" onclick="window.location.href='lobby.html'"><i class="fas fa-redo"></i> Jugar de nuevo</button>
                    <a href="../index.html" style="display: inline-block; margin-left: 15px; background: rgba(255,255,255,0.15); color: white; padding: 14px 35px; border-radius: 60px; text-decoration: none;">Volver al menú</a>
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function cargarPartida() {
            const salaRef = doc(db, "partidas_multijugador", salaId);
            const salaDoc = await getDoc(salaRef);
            if (!salaDoc.exists()) { 
                window.location.href = 'lobby.html'; 
                return; 
            }
            
            salaData = salaDoc.data();
            esJugador1 = salaData.jugador1 === currentUser.uid;
            
            if (!salaData.iniciado) {
                await iniciarJuego();
                await mostrarCuentaAtras();
                const updatedDoc = await getDoc(salaRef);
                salaData = updatedDoc.data();
                renderizarJuego();
            } else {
                await mostrarCuentaAtras();
                renderizarJuego();
            }
            
            unsubscribe = onSnapshot(salaRef, (doc) => {
                if (doc.exists() && gameActivo) {
                    const newData = doc.data();
                    const oldTurno = salaData?.turno;
                    salaData = newData;
                    
                    if (oldTurno !== salaData.turno && gameActivo) {
                        if (timerInterval) clearInterval(timerInterval);
                        renderizarJuego();
                    }
                }
            });
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        onAuthStateChanged(auth, async (user) => {
            renderUserZone();
            if (!user) { 
                window.location.href = '../../login.html'; 
                return; 
            }
            currentUser = user;
            const urlParams = new URLSearchParams(window.location.search);
            salaId = urlParams.get('sala');
            if (!salaId) { 
                window.location.href = 'lobby.html'; 
                return; 
            }
            await cargarPartida();
        });
    </script>
</body>
</html>
