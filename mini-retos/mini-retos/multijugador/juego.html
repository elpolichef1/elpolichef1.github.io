<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrera Multijugador | AprobadoYa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; }
        h1 i { color: #fbbf24; }
        
        .race-track {
            background: rgba(0,0,0,0.3);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .track {
            position: relative;
            height: 80px;
            background: #3a4a30;
            border-radius: 40px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .car {
            position: absolute;
            bottom: 10px;
            left: 0%;
            font-size: 2rem;
            transition: left 0.3s;
        }
        .finish-line {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 30px;
            background: repeating-linear-gradient(90deg, #000 0px, #000 10px, #fff 10px, #fff 20px);
        }
        .player-name {
            position: absolute;
            top: -22px;
            left: 10px;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.6);
            padding: 2px 10px;
            border-radius: 20px;
        }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .score-item { text-align: center; flex: 1; }
        .score-value { font-size: 1.3rem; font-weight: 800; color: #fbbf24; }
        
        .question-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            color: #1e293b;
        }
        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .options { display: grid; gap: 10px; }
        .option-btn {
            padding: 12px 15px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            gap: 10px;
        }
        .option-btn:hover { background: #fef3c7; }
        .disabled { opacity: 0.5; cursor: not-allowed; }
        .turn-indicator {
            text-align: center;
            padding: 10px;
            background: #fbbf24;
            color: #1a472a;
            border-radius: 50px;
            margin-bottom: 15px;
        }
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .countdown-number {
            font-size: 6rem;
            font-weight: 800;
            color: #fbbf24;
            animation: bounce 0.5s ease;
        }
        @keyframes bounce {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .waiting-message {
            text-align: center;
            padding: 60px;
            background: rgba(0,0,0,0.4);
            border-radius: 30px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .resultado-final {
            text-align: center;
            padding: 40px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-flag-checkered"></i> Carrera Multijugador</h1>
        <div id="gameContent">
            <div class="waiting-message">
                <div class="spinner"></div>
                <p>Cargando partida...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, getDoc, updateDoc, onSnapshot } from '../../js/firebase-init.js';
        import { renderUserZone } from '../../js/global-auth.js';
        import { preguntasDGT } from '../../test/data/preguntas.js';
        
        let salaId = null;
        let currentUser = null;
        let salaData = null;
        let esJugador1 = false;
        let respuestaSeleccionada = false;
        let gameActivo = true;
        let unsubscribe = null;
        
        function obtenerPregunta() {
            return preguntasDGT[Math.floor(Math.random() * preguntasDGT.length)];
        }
        
        function mostrarCuentaAtras() {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'countdown-overlay';
                overlay.innerHTML = `<div class="countdown-number" id="countdownNum">3</div>`;
                document.body.appendChild(overlay);
                let count = 3;
                const interval = setInterval(() => {
                    count--;
                    if (count >= 1) {
                        const num = document.getElementById('countdownNum');
                        num.textContent = count;
                        num.style.animation = 'none';
                        setTimeout(() => num.style.animation = 'bounce 0.5s ease', 10);
                    } else {
                        clearInterval(interval);
                        overlay.remove();
                        resolve();
                    }
                }, 1000);
            });
        }
        
        async function iniciarJuego() {
            const preguntas = [];
            for (let i = 0; i < 5; i++) preguntas.push(obtenerPregunta());
            await updateDoc(doc(db, "partidas_multijugador", salaId), {
                preguntas: preguntas,
                turno: 0,
                puntuacion1: 0,
                puntuacion2: 0
            });
        }
        
        async function responder(respuesta) {
            if (!gameActivo || respuestaSeleccionada) return;
            if (salaData.turno !== (esJugador1 ? 0 : 1)) return;
            
            respuestaSeleccionada = true;
            const pregunta = salaData.preguntas[salaData.turno];
            const esCorrecto = (respuesta === pregunta.correcta);
            
            const nuevaP1 = salaData.puntuacion1 + (esJugador1 && esCorrecto ? 1 : 0);
            const nuevaP2 = salaData.puntuacion2 + (!esJugador1 && esCorrecto ? 1 : 0);
            const nuevoTurno = salaData.turno + 1;
            
            await updateDoc(doc(db, "partidas_multijugador", salaId), {
                puntuacion1: nuevaP1,
                puntuacion2: nuevaP2,
                turno: nuevoTurno
            });
            
            if (nuevoTurno >= salaData.preguntas.length) {
                setTimeout(() => finalizarJuego(), 1000);
            }
        }
        
        function renderizarJuego() {
            const p1 = salaData.puntuacion1 || 0;
            const p2 = salaData.puntuacion2 || 0;
            const total = salaData.preguntas.length;
            const turno = salaData.turno;
            
            if (turno >= total) { finalizarJuego(); return; }
            
            const pregunta = salaData.preguntas[turno];
            const esMiTurno = (turno === (esJugador1 ? 0 : 1));
            const avance1 = (p1 / total) * 100;
            const avance2 = (p2 / total) * 100;
            
            document.getElementById('gameContent').innerHTML = `
                <div class="race-track">
                    <div class="track">
                        <div class="player-name">🏎️ ${salaData.jugador1Nombre}</div>
                        <div class="car" style="left: ${Math.min(avance1, 96)}%">🏎️</div>
                        <div class="finish-line"></div>
                    </div>
                    <div class="track">
                        <div class="player-name">🏎️ ${salaData.jugador2Nombre}</div>
                        <div class="car" style="left: ${Math.min(avance2, 96)}%">🏎️</div>
                        <div class="finish-line"></div>
                    </div>
                </div>
                <div class="score-board">
                    <div class="score-item"><div class="score-value">${p1}</div><div>${salaData.jugador1Nombre}</div></div>
                    <div class="score-item"><div class="score-value">${turno+1}/${total}</div><div>Pregunta</div></div>
                    <div class="score-item"><div class="score-value">${p2}</div><div>${salaData.jugador2Nombre}</div></div>
                </div>
                ${!esMiTurno ? '<div class="turn-indicator">⏳ Esperando oponente...</div>' : ''}
                <div class="question-card">
                    <div class="question-text">${pregunta.texto}</div>
                    <div class="options" id="options">
                        ${pregunta.opciones.map((opt, idx) => `
                            <div class="option-btn" data-opcion="${idx}">
                                <span style="font-weight:800;">${String.fromCharCode(65+idx)}.</span>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            if (esMiTurno && gameActivo) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', () => responder(parseInt(btn.dataset.opcion)));
                });
            } else {
                document.querySelectorAll('.option-btn').forEach(btn => btn.classList.add('disabled'));
            }
        }
        
        async function finalizarJuego() {
            gameActivo = false;
            const p1 = salaData.puntuacion1 || 0;
            const p2 = salaData.puntuacion2 || 0;
            const ganador = p1 > p2 ? salaData.jugador1Nombre : (p2 > p1 ? salaData.jugador2Nombre : "Empate");
            const esGanador = (p1 > p2 && esJugador1) || (p2 > p1 && !esJugador1);
            
            document.getElementById('gameContent').innerHTML = `
                <div class="resultado-final">
                    <i class="fas fa-trophy" style="font-size: 3rem; color: #fbbf24;"></i>
                    <h2>🏁 ¡FIN DE LA PARTIDA! 🏁</h2>
                    <p><strong>${salaData.jugador1Nombre}</strong>: ${p1} puntos</p>
                    <p><strong>${salaData.jugador2Nombre}</strong>: ${p2} puntos</p>
                    <h3 style="color:#fbbf24; margin:15px 0;">${ganador === "Empate" ? "¡EMPATE!" : (esGanador ? "🎉 ¡HAS GANADO! 🎉" : `¡GANÓ ${ganador}!`)}</h3>
                    <button onclick="window.location.href='lobby.html'" style="background:#fbbf24; color:#1a472a; border:none; padding:12px 25px; border-radius:50px; margin-top:15px;">Jugar de nuevo</button>
                </div>
            `;
            if (unsubscribe) unsubscribe();
        }
        
        async function cargarPartida() {
            const salaRef = doc(db, "partidas_multijugador", salaId);
            const salaDoc = await getDoc(salaRef);
            if (!salaDoc.exists()) { window.location.href = 'lobby.html'; return; }
            
            salaData = salaDoc.data();
            esJugador1 = salaData.jugador1 === currentUser.uid;
            
            if (!salaData.preguntas) {
                await iniciarJuego();
            }
            
            await mostrarCuentaAtras();
            renderizarJuego();
            
            unsubscribe = onSnapshot(salaRef, (doc) => {
                if (doc.exists() && doc.data().preguntas && gameActivo) {
                    salaData = doc.data();
                    renderizarJuego();
                }
            });
        }
        
        onAuthStateChanged(auth, async (user) => {
            renderUserZone();
            if (!user) { window.location.href = '../../login.html'; return; }
            currentUser = user;
            const urlParams = new URLSearchParams(window.location.search);
            salaId = urlParams.get('sala');
            if (!salaId) { window.location.href = 'lobby.html'; return; }
            await cargarPartida();
        });
    </script>
</body>
</html>
