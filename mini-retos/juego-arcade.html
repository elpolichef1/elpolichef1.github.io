<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade de señales | Mini Retos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-header { background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%); color: white; padding: 30px 0; text-align: center; }
        .game-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .score-board { display: flex; justify-content: space-between; background: white; border-radius: 20px; padding: 20px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .score-item { text-align: center; }
        .score-value { font-size: 1.8rem; font-weight: 800; color: #fbbf24; }
        .señal-card { background: white; border-radius: 25px; padding: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .señal-icono { font-size: 6rem; margin-bottom: 20px; background: #f8fafc; padding: 30px; border-radius: 20px; display: inline-block; width: 100%; box-sizing: border-box; }
        .opciones { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .opcion-btn { padding: 15px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 15px; cursor: pointer; transition: all 0.3s; font-weight: 500; text-align: center; }
        .opcion-btn:hover { background: #fef3c7; border-color: #fbbf24; transform: translateY(-2px); }
        .timer-bar { height: 6px; background: #e2e8f0; border-radius: 3px; margin-top: 20px; overflow: hidden; }
        .timer-fill { height: 100%; background: #fbbf24; width: 100%; transition: width 1s linear; }
        .result-message { margin-top: 20px; padding: 15px; border-radius: 15px; display: none; }
        .result-message.correct { background: #d1fae5; color: #065f46; display: block; }
        .result-message.wrong { background: #fee2e2; color: #991b1b; display: block; }
        @media (max-width: 768px) { .opciones { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><i class="fas fa-check-circle"></i><h1>Aprobado<span>Ya</span></h1></div>
            <div class="nav-container"><div class="nav-wrapper"><nav><ul><li><a href="../index.html">Inicio</a></li><li><a href="../temas/index.html">Temas</a></li><li><a href="../test/index.html">Test</a></li><li><a href="../mini-retos/index.html" class="active">Mini Retos</a></li></ul></nav></div></div>
            <div class="user-zone" id="userZone"></div>
            <button class="menu-mobile" id="menuMobileBtn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="game-header">
        <div class="container">
            <h1><i class="fas fa-gamepad"></i> Arcade de señales</h1>
            <p>Identifica la señal que aparece en pantalla antes de que desaparezca</p>
        </div>
    </div>

    <div class="game-container">
        <div class="score-board">
            <div class="score-item"><div class="score-value" id="puntos">0</div><div>Puntos</div></div>
            <div class="score-item"><div class="score-value" id="racha">0</div><div>Racha</div></div>
            <div class="score-item"><div class="score-value" id="nivel">1</div><div>Nivel</div></div>
        </div>

        <div class="señal-card" id="señalCard">
            <div class="señal-icono" id="señalIcono">🛑</div>
            <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
            <div class="opciones" id="opcionesContainer"></div>
            <div class="result-message" id="resultMessage"></div>
        </div>
    </div>

   <script type="module">
    import { auth, onAuthStateChanged, signOut } from '../js/firebase-init.js';
    import { renderUserZone } from '../js/global-auth.js';
    
    const señales = [
        { icono: "🛑", nombre: "STOP" }, { icono: "⚠️", nombre: "Peligro" }, { icono: "🚫", nombre: "Prohibido el paso" },
        { icono: "➡️", nombre: "Dirección obligatoria" }, { icono: "🅿️", nombre: "Estacionamiento" }, { icono: "🚸", nombre: "Paso de peatones" },
        { icono: "🚲", nombre: "Carril bici" }, { icono: "🚌", nombre: "Parada de autobús" }, { icono: "🏁", nombre: "Llegada" },
        { icono: "🔞", nombre: "Prohibido menores" }, { icono: "📵", nombre: "Prohibido móvil" }, { icono: "⛔", nombre: "Prohibido entrada" }
    ];

    let puntos = 0, racha = 0, nivel = 1, tiempoActual = 5, timerInterval, opcionSeleccionada = false, gameActivo = true, señalActual = null;

    function iniciarJuego() { cargarSeñal(); }

    function cargarSeñal() {
        if (!gameActivo) return;
        const randomIndex = Math.floor(Math.random() * señales.length);
        señalActual = señales[randomIndex];
        document.getElementById('señalIcono').textContent = señalActual.icono;
        const otrasSeñales = señales.filter(s => s.nombre !== señalActual.nombre);
        const opcionesAleatorias = [...otrasSeñales];
        for (let i = opcionesAleatorias.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [opcionesAleatorias[i], opcionesAleatorias[j]] = [opcionesAleatorias[j], opcionesAleatorias[i]]; }
        const opciones = [señalActual, ...opcionesAleatorias.slice(0, 3)];
        for (let i = opciones.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [opciones[i], opciones[j]] = [opciones[j], opciones[i]]; }
        const opcionesContainer = document.getElementById('opcionesContainer');
        opcionesContainer.innerHTML = opciones.map(op => `<div class="opcion-btn" onclick="responder('${op.nombre}')">${op.nombre}</div>`).join('');
        opcionSeleccionada = false;
        document.getElementById('resultMessage').className = 'result-message';
        document.getElementById('resultMessage').style.display = 'none';
        tiempoActual = Math.max(5 - (nivel - 1) * 0.3, 2);
        iniciarTemporizador();
    }

    function iniciarTemporizador() {
        if (timerInterval) clearInterval(timerInterval);
        let tiempoRestante = tiempoActual;
        const timerFill = document.getElementById('timerFill');
        timerFill.style.width = '100%';
        timerFill.style.transition = 'none';
        setTimeout(() => { timerFill.style.transition = 'width 1s linear'; }, 10);
        timerInterval = setInterval(() => {
            if (opcionSeleccionada || !gameActivo) return;
            tiempoRestante -= 0.05;
            const porcentaje = (tiempoRestante / tiempoActual) * 100;
            timerFill.style.width = `${Math.max(0, porcentaje)}%`;
            if (tiempoRestante <= 0) { clearInterval(timerInterval); responder(null); }
        }, 50);
    }

    window.responder = function(respuesta) {
        if (opcionSeleccionada || !gameActivo) return;
        clearInterval(timerInterval);
        opcionSeleccionada = true;
        const esCorrecto = (respuesta === señalActual.nombre);
        const resultMessage = document.getElementById('resultMessage');
        if (esCorrecto) {
            racha++;
            const puntosGanados = 10 + (racha * 2) + (nivel * 5);
            puntos += puntosGanados;
            if (racha >= 5) { nivel++; document.getElementById('nivel').textContent = nivel; resultMessage.innerHTML = `<i class="fas fa-level-up-alt"></i> ¡Correcto! Subes al nivel ${nivel} +${puntosGanados} puntos`; }
            else { resultMessage.innerHTML = `<i class="fas fa-check-circle"></i> ¡Correcto! +${puntosGanados} puntos`; }
            resultMessage.className = 'result-message correct';
            resultMessage.style.display = 'block';
            actualizarPuntuacion();
            setTimeout(() => { cargarSeñal(); }, 800);
        } else {
            racha = 0;
            resultMessage.className = 'result-message wrong';
            resultMessage.innerHTML = `<i class="fas fa-times-circle"></i> Incorrecto. La señal es: ${señalActual.nombre} (${señalActual.icono})`;
            resultMessage.style.display = 'block';
            gameActivo = false;
            setTimeout(() => { mostrarGameOver(); }, 2000);
        }
    }

    function actualizarPuntuacion() { document.getElementById('puntos').textContent = puntos; document.getElementById('racha').textContent = racha; }

    function mostrarGameOver() {
        const bonus = nivel >= 5 ? 100 : (nivel >= 3 ? 50 : 0);
        const totalPuntos = puntos + bonus;
        const señalCard = document.getElementById('señalCard');
        señalCard.innerHTML = `<div style="text-align: center; padding: 20px;"><i class="fas fa-trophy" style="font-size: 4rem; color: #fbbf24;"></i><h2>🎮 ¡GAME OVER!</h2><p><strong>Nivel alcanzado:</strong> ${nivel}</p><p><strong>Puntuación final:</strong> ${totalPuntos} puntos</p><p><strong>Mejor racha:</strong> ${racha} aciertos seguidos</p>${bonus > 0 ? `<p><i class="fas fa-star"></i> Bonus por nivel: +${bonus} puntos</p>` : ''}<div style="margin-top: 20px;"><button onclick="reiniciarJuego()" style="background: #fbbf24; color: #1a472a; border: none; padding: 10px 25px; border-radius: 50px; cursor: pointer;"><i class="fas fa-redo"></i> Jugar de nuevo</button><a href="index.html" style="display: inline-block; margin-left: 10px; background: #f1f5f9; color: #1e293b; padding: 10px 25px; border-radius: 50px; text-decoration: none;"><i class="fas fa-arrow-left"></i> Volver al menú</a></div></div>`;
        guardarPuntuacion(totalPuntos);
    }

    window.reiniciarJuego = function() { location.reload(); };
    function guardarPuntuacion(puntos) { const stats = JSON.parse(localStorage.getItem('aprobadoya_minijuegos') || '{}'); stats.totalJuegos = (stats.totalJuegos || 0) + 1; stats.totalPuntos = (stats.totalPuntos || 0) + puntos; localStorage.setItem('aprobadoya_minijuegos', JSON.stringify(stats)); }

    onAuthStateChanged(auth, (user) => {
        renderUserZone();
        if (!user) { window.location.href = '../login.html'; }
        else { iniciarJuego(); }
    });
    document.getElementById('menuMobileBtn')?.addEventListener('click', () => { document.querySelector('.nav-wrapper')?.classList.toggle('active'); });
</script>
</body>
</html>
