<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Procesando Google Test</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .spinner { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #4285f4; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="spinner"></div>
        <p>Procesando inicio de sesión con Google...</p>
    </div>
    <script>
        // Redirigir a test-google.html con el token
        if (window.location.hash) {
            window.location.href = 'test-google.html' + window.location.hash;
        } else {
            window.location.href = 'test-google.html';
        }
    </script>
</body>
</html>
