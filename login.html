<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AprobadoYa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .login-header i {
            font-size: 3.5rem;
            margin-bottom: 15px;
            color: #fbbf24;
        }
        .login-header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .login-header p {
            opacity: 0.8;
            font-size: 0.9rem;
        }
        .login-body {
            padding: 40px;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e293b;
            font-size: 0.85rem;
        }
        .form-group label i {
            color: #fbbf24;
            width: 20px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251,191,36,0.1);
        }
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a472a;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(251,191,36,0.4);
        }
        .google-btn {
            width: 100%;
            background: white;
            color: #1e293b;
            border: 2px solid #e2e8f0;
            padding: 12px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }
        .google-btn:hover {
            background: #f8fafc;
            border-color: #fbbf24;
            transform: translateY(-2px);
        }
        .google-btn i.fa-google {
            color: #4285f4;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #94a3b8;
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }
        .register-link {
            text-align: center;
            margin-top: 15px;
            color: #64748b;
            font-size: 0.85rem;
        }
        .register-link a {
            color: #fbbf24;
            text-decoration: none;
            font-weight: 600;
        }
        .forgot-password {
            text-align: right;
            margin-top: 8px;
            margin-bottom: 5px;
        }
        .forgot-password a {
            color: #94a3b8;
            font-size: 0.75rem;
            text-decoration: none;
            transition: all 0.3s;
        }
        .forgot-password a:hover {
            color: #fbbf24;
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
            text-align: center;
            font-size: 0.85rem;
        }
        .success-message {
            background: #d1fae5;
            color: #059669;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
            text-align: center;
            font-size: 0.85rem;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
        }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 1rem;
        }
        
        /* Modal de recuperación */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 35px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content h3 {
            color: #1a472a;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        .modal-content p {
            color: #64748b;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .modal-content input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        .modal-content input:focus {
            outline: none;
            border-color: #fbbf24;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .modal-buttons button {
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .btn-enviar {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a472a;
        }
        .btn-cancelar {
            background: #e2e8f0;
            color: #475569;
        }
        .btn-enviar:hover, .btn-cancelar:hover {
            transform: translateY(-2px);
        }
        .modal-error {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            font-size: 0.8rem;
        }
        .modal-success {
            background: #d1fae5;
            color: #059669;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            font-size: 0.8rem;
        }
        @media (max-width: 480px) {
            .login-header { padding: 30px; }
            .login-body { padding: 30px 25px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-check-circle"></i>
            <h1>AprobadoYa</h1>
            <p>Tu plataforma para aprobar el carnet de conducir</p>
        </div>
        <div class="login-body">
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@email.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="forgot-password">
                    <a href="#" id="forgotPasswordBtn">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Iniciar sesión
                </button>
                <div id="errorMessage" class="error-message"></div>
            </form>
            <div class="divider">O continúa con</div>
            <button id="googleLoginBtn" class="google-btn">
                <i class="fab fa-google"></i> Iniciar sesión con Google
            </button>
            <div class="register-link">
                ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
            </div>
        </div>
    </div>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Conectando con Google...</div>
    </div>

    <!-- Modal de recuperación de contraseña -->
    <div id="resetModal" class="modal-overlay">
        <div class="modal-content">
            <i class="fas fa-key" style="font-size: 2.5rem; color: #fbbf24; margin-bottom: 15px;"></i>
            <h3>Recuperar contraseña</h3>
            <p>Te enviaremos un enlace para restablecer tu contraseña</p>
            <div id="modalError" class="modal-error"></div>
            <div id="modalSuccess" class="modal-success"></div>
            <input type="email" id="resetEmail" placeholder="tu@email.com">
            <div class="modal-buttons">
                <button class="btn-enviar" id="sendResetBtn">Enviar enlace</button>
                <button class="btn-cancelar" id="cancelResetBtn">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, 
            signInWithPopup, 
            googleProvider,
            signInWithEmailAndPassword,
            sendPasswordResetEmail
        } from './js/firebase-init.js';
        import { guardarUsuarioFirestore } from './js/ranking-firebase.js';
        
        const googleBtn = document.getElementById('googleLoginBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorDiv = document.getElementById('errorMessage');
        
        // Modal elements
        const resetModal = document.getElementById('resetModal');
        const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');
        const sendResetBtn = document.getElementById('sendResetBtn');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const resetEmail = document.getElementById('resetEmail');
        const modalError = document.getElementById('modalError');
        const modalSuccess = document.getElementById('modalSuccess');
        
        async function loginWithGoogle() {
            loadingOverlay.style.display = 'flex';
            googleBtn.disabled = true;
            
            try {
                const result = await signInWithPopup(auth, googleProvider);
                await guardarUsuarioFirestore(result.user);
                window.location.href = 'index.html';
            } catch (error) {
                console.error(error);
                loadingOverlay.style.display = 'none';
                googleBtn.disabled = false;
                errorDiv.textContent = '❌ Error al iniciar sesión: ' + error.message;
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 5000);
            }
        }
        
        googleBtn.addEventListener('click', loginWithGoogle);
        
        // Mostrar modal de recuperación
        forgotPasswordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            resetEmail.value = '';
            modalError.style.display = 'none';
            modalSuccess.style.display = 'none';
            resetModal.classList.add('active');
        });
        
        // Enviar correo de recuperación
        async function sendResetPassword() {
            const email = resetEmail.value.trim();
            
            modalError.style.display = 'none';
            modalSuccess.style.display = 'none';
            
            if (!email) {
                modalError.textContent = '❌ Por favor, introduce tu correo electrónico';
                modalError.style.display = 'block';
                return;
            }
            
            try {
                await sendPasswordResetEmail(auth, email);
                modalSuccess.textContent = '✅ Te hemos enviado un enlace a tu correo para restablecer tu contraseña';
                modalSuccess.style.display = 'block';
                
                // Limpiar y cerrar modal después de 3 segundos
                setTimeout(() => {
                    resetModal.classList.remove('active');
                    resetEmail.value = '';
                }, 3000);
                
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/user-not-found') {
                    modalError.textContent = '❌ No existe ninguna cuenta con este correo electrónico';
                } else {
                    modalError.textContent = '❌ Error al enviar el correo: ' + error.message;
                }
                modalError.style.display = 'block';
            }
        }
        
        sendResetBtn.addEventListener('click', sendResetPassword);
        
        // Cerrar modal
        cancelResetBtn.addEventListener('click', () => {
            resetModal.classList.remove('active');
        });
        
        // Cerrar modal al hacer clic fuera
        window.addEventListener('click', (e) => {
            if (e.target === resetModal) {
                resetModal.classList.remove('active');
            }
        });
        
        // Login con email
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            errorDiv.style.display = 'none';
            
            try {
                const result = await signInWithEmailAndPassword(auth, email, password);
                await guardarUsuarioFirestore(result.user);
                window.location.href = 'index.html';
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/wrong-password') {
                    errorDiv.textContent = '❌ Contraseña incorrecta';
                } else if (error.code === 'auth/user-not-found') {
                    errorDiv.textContent = '❌ No existe una cuenta con este email';
                } else {
                    errorDiv.textContent = '❌ Email o contraseña incorrectos';
                }
                errorDiv.style.display = 'block';
            }
        });
        
        // Permitir enviar con Enter en el modal
        resetEmail.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendResetPassword();
            }
        });
    </script>
</body>
</html>
