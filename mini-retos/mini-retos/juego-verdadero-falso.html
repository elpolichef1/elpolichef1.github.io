<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verdadero o Falso | Mini Retos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-header { background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%); color: white; padding: 30px 0; text-align: center; }
        .game-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .score-board { display: flex; justify-content: space-between; background: white; border-radius: 20px; padding: 20px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .score-item { text-align: center; }
        .score-value { font-size: 1.8rem; font-weight: 800; color: #fbbf24; }
        .question-card { background: white; border-radius: 25px; padding: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .question-text { font-size: 1.3rem; font-weight: 600; margin-bottom: 30px; color: #1e293b; line-height: 1.5; }
        .options { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .option-btn { flex: 1; min-width: 150px; padding: 15px 25px; border: none; border-radius: 50px; font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-verdadero { background: #10b981; color: white; }
        .btn-verdadero:hover { background: #059669; transform: translateY(-2px); }
        .btn-falso { background: #ef4444; color: white; }
        .btn-falso:hover { background: #dc2626; transform: translateY(-2px); }
        .result-message { margin-top: 25px; padding: 15px; border-radius: 15px; display: none; font-weight: 500; }
        .result-message.correct { background: #d1fae5; color: #065f46; display: block; }
        .result-message.wrong { background: #fee2e2; color: #991b1b; display: block; }
        .next-btn { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1a472a; border: none; padding: 12px 30px; border-radius: 50px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 20px; display: none; width: 100%; }
        .timer-bar { height: 6px; background: #e2e8f0; border-radius: 3px; margin-top: 20px; overflow: hidden; }
        .timer-fill { height: 100%; background: #fbbf24; width: 100%; transition: width 1s linear; }
        @media (max-width: 768px) { .options { flex-direction: column; } .option-btn { width: 100%; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><i class="fas fa-check-circle"></i><h1>Aprobado<span>Ya</span></h1></div>
            <div class="nav-container"><div class="nav-wrapper"><nav><ul><li><a href="../index.html">Inicio</a></li><li><a href="../temas/index.html">Temas</a></li><li><a href="../test/index.html">Test</a></li><li><a href="../mini-retos/index.html" class="active">Mini Retos</a></li></ul></nav></div></div>
            <div class="user-zone" id="userZone"></div>
            <button class="menu-mobile" id="menuMobileBtn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="game-header">
        <div class="container">
            <h1><i class="fas fa-check-double"></i> Verdadero o Falso</h1>
            <p>Decide si las afirmaciones sobre normas de tráfico son verdaderas o falsas</p>
        </div>
    </div>

    <div class="game-container">
        <div class="score-board">
            <div class="score-item"><div class="score-value" id="puntos">0</div><div>Puntos</div></div>
            <div class="score-item"><div class="score-value" id="racha">0</div><div>Racha</div></div>
            <div class="score-item"><div class="score-value" id="preguntaNum">1</div><div>/ 20</div></div>
        </div>

        <div class="question-card" id="questionCard">
            <div class="question-text" id="questionText">Cargando pregunta...</div>
            <div class="options">
                <button class="option-btn btn-verdadero" id="btnVerdadero"><i class="fas fa-check"></i> Verdadero</button>
                <button class="option-btn btn-falso" id="btnFalso"><i class="fas fa-times"></i> Falso</button>
            </div>
            <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
            <div class="result-message" id="resultMessage"></div>
            <button class="next-btn" id="nextBtn">Siguiente pregunta →</button>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../test/data/preguntas.js"></script>
    <script>
        // Preguntas de verdadero/falso basadas en el tema 1 y 2
        const preguntasVF = [
            { texto: "En una intersección sin señalizar, la prioridad la tiene el vehículo que circula por la izquierda.", esVerdadero: false, explicacion: "La prioridad es para el vehículo que circula por la derecha." },
            { texto: "El cinturón de seguridad es obligatorio solo para el conductor y el acompañante delantero.", esVerdadero: false, explicacion: "Es obligatorio para todos los ocupantes del vehículo." },
            { texto: "La tasa máxima de alcoholemia para conductores noveles es de 0,3 gramos por litro de sangre.", esVerdadero: true, explicacion: "Los conductores noveles tienen un límite de 0,3 g/l en sangre." },
            { texto: "Está permitido usar el teléfono móvil mientras se conduce si se utiliza con manos libres.", esVerdadero: false, explicacion: "Está prohibido usar el móvil al volante, incluso con manos libres, salvo en caso de emergencia." },
            { texto: "La señal de STOP tiene forma octogonal y fondo rojo con letras blancas.", esVerdadero: true, explicacion: "La señal de STOP es octogonal, de fondo rojo con letras blancas." },
            { texto: "En una rotonda, los vehículos que circulan por ella deben ceder el paso a los que entran.", esVerdadero: false, explicacion: "Los que entran deben ceder el paso a los que ya circulan por la rotonda." },
            { texto: "La velocidad máxima para un turismo en autovía es de 120 km/h.", esVerdadero: true, explicacion: "La velocidad máxima para turismos en autovía es 120 km/h." },
            { texto: "Está permitido adelantar en un paso de peatones si no hay peatones cruzando.", esVerdadero: false, explicacion: "Está prohibido adelantar en pasos de peatones." },
            { texto: "La ITV debe pasarse cada 2 años para turismos de más de 10 años.", esVerdadero: true, explicacion: "Los turismos de más de 10 años pasan ITV anualmente." },
            { texto: "El uso de cadenas es obligatorio siempre que haya nieve en la calzada.", esVerdadero: false, explicacion: "Solo cuando lo indique la señal." },
            { texto: "La luz de emergencia (V-16) es obligatoria desde 2026.", esVerdadero: true, explicacion: "La luz V-16 sustituirá a los triángulos de emergencia." },
            { texto: "Los ciclomotores pueden circular por autopistas.", esVerdadero: false, explicacion: "Los ciclomotores tienen prohibido circular por autopistas y autovías." },
            { texto: "El permiso B permite conducir turismos de hasta 3.500 kg.", esVerdadero: true, explicacion: "El permiso B es para turismos hasta 3.500 kg y 9 plazas." },
            { texto: "Con niebla densa se recomienda usar la luz larga para ver mejor.", esVerdadero: false, explicacion: "La luz larga empeora la visibilidad con niebla. Use luz de cruce o antiniebla." },
            { texto: "Los patinetes eléctricos (VMP) pueden circular por aceras.", esVerdadero: false, explicacion: "Los VMP tienen prohibido circular por aceras." },
            { texto: "La distancia de seguridad recomendada es de 2 segundos con el vehículo delantero.", esVerdadero: true, explicacion: "La regla de los 2 segundos es la distancia de seguridad recomendada." },
            { texto: "El ABS evita que las ruedas se bloqueen al frenar.", esVerdadero: true, explicacion: "El sistema antibloqueo de frenos evita el bloqueo de las ruedas." },
            { texto: "Los conductores noveles tienen 12 puntos iniciales en el carnet.", esVerdadero: false, explicacion: "Los noveles tienen 8 puntos iniciales." },
            { texto: "Las señales de servicio (hospital, gasolinera) son de color azul.", esVerdadero: true, explicacion: "Las señales de servicio son de color azul." },
            { texto: "Está permitido estacionar en doble fila si es por poco tiempo.", esVerdadero: false, explicacion: "Está prohibido estacionar en doble fila en cualquier caso." }
        ];

        let preguntasActuales = [];
        let indiceActual = 0;
        let puntos = 0;
        let racha = 0;
        let opcionSeleccionada = false;
        let timerInterval;
        let tiempoRestante = 10;

        function iniciarJuego() {
            // Mezclar preguntas
            preguntasActuales = [...preguntasVF];
            for (let i = preguntasActuales.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [preguntasActuales[i], preguntasActuales[j]] = [preguntasActuales[j], preguntasActuales[i]];
            }
            indiceActual = 0;
            puntos = 0;
            racha = 0;
            actualizarPuntuacion();
            cargarPregunta();
        }

        function cargarPregunta() {
            if (indiceActual >= preguntasActuales.length) {
                finalizarJuego();
                return;
            }
            
            const pregunta = preguntasActuales[indiceActual];
            document.getElementById('questionText').textContent = pregunta.texto;
            document.getElementById('preguntaNum').textContent = indiceActual + 1;
            opcionSeleccionada = false;
            document.getElementById('resultMessage').className = 'result-message';
            document.getElementById('resultMessage').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            
            // Habilitar botones
            document.getElementById('btnVerdadero').disabled = false;
            document.getElementById('btnFalso').disabled = false;
            
            iniciarTemporizador();
        }

        function iniciarTemporizador() {
            if (timerInterval) clearInterval(timerInterval);
            tiempoRestante = 10;
            const timerFill = document.getElementById('timerFill');
            timerFill.style.width = '100%';
            timerFill.style.transition = 'none';
            setTimeout(() => { timerFill.style.transition = 'width 1s linear'; }, 10);
            
            timerInterval = setInterval(() => {
                if (opcionSeleccionada) return;
                tiempoRestante--;
                const porcentaje = (tiempoRestante / 10) * 100;
                timerFill.style.width = `${porcentaje}%`;
                
                if (tiempoRestante <= 0) {
                    clearInterval(timerInterval);
                    responder(null);
                }
            }, 1000);
        }

        function responder(respuesta) {
            if (opcionSeleccionada) return;
            opcionSeleccionada = true;
            clearInterval(timerInterval);
            
            const pregunta = preguntasActuales[indiceActual];
            const esCorrecto = (respuesta === pregunta.esVerdadero);
            const resultMessage = document.getElementById('resultMessage');
            
            // Deshabilitar botones
            document.getElementById('btnVerdadero').disabled = true;
            document.getElementById('btnFalso').disabled = true;
            
            if (esCorrecto) {
                racha++;
                const puntosGanados = 10 + (racha * 2);
                puntos += puntosGanados;
                resultMessage.className = 'result-message correct';
                resultMessage.innerHTML = `<i class="fas fa-check-circle"></i> ¡Correcto! +${puntosGanados} puntos<br><small>${pregunta.explicacion}</small>`;
            } else {
                racha = 0;
                resultMessage.className = 'result-message wrong';
                const respuestaCorrecta = pregunta.esVerdadero ? "Verdadero" : "Falso";
                resultMessage.innerHTML = `<i class="fas fa-times-circle"></i> Incorrecto. La respuesta correcta es: ${respuestaCorrecta}<br><small>${pregunta.explicacion}</small>`;
            }
            
            resultMessage.style.display = 'block';
            actualizarPuntuacion();
            document.getElementById('nextBtn').style.display = 'block';
        }

        function actualizarPuntuacion() {
            document.getElementById('puntos').textContent = puntos;
            document.getElementById('racha').textContent = racha;
        }

        function siguientePregunta() {
            indiceActual++;
            cargarPregunta();
        }

        function finalizarJuego() {
            clearInterval(timerInterval);
            const bonus = racha >= 5 ? 50 : 0;
            const totalPuntos = puntos + bonus;
            
            const questionCard = document.getElementById('questionCard');
            questionCard.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <i class="fas fa-trophy" style="font-size: 4rem; color: #fbbf24;"></i>
                    <h2 style="color: #10b981;">🏆 ¡Juego completado! 🏆</h2>
                    <p>Has respondido ${preguntasActuales.length} preguntas</p>
                    <p><strong>Puntuación final:</strong> ${totalPuntos} puntos</p>
                    <p><strong>Mejor racha:</strong> ${racha} aciertos seguidos</p>
                    ${bonus > 0 ? `<p><i class="fas fa-star"></i> Bonus por racha: +${bonus} puntos</p>` : ''}
                    <div style="margin-top: 20px;">
                        <button onclick="reiniciarJuego()" style="background: #fbbf24; color: #1a472a; border: none; padding: 10px 25px; border-radius: 50px; cursor: pointer;"><i class="fas fa-redo"></i> Jugar de nuevo</button>
                        <a href="index.html" style="display: inline-block; margin-left: 10px; background: #f1f5f9; color: #1e293b; padding: 10px 25px; border-radius: 50px; text-decoration: none;"><i class="fas fa-arrow-left"></i> Volver al menú</a>
                    </div>
                </div>
            `;
            
            guardarPuntuacion(totalPuntos);
        }

        function reiniciarJuego() {
            iniciarJuego();
            const questionCard = document.getElementById('questionCard');
            questionCard.innerHTML = `
                <div class="question-text" id="questionText">Cargando pregunta...</div>
                <div class="options">
                    <button class="option-btn btn-verdadero" id="btnVerdadero"><i class="fas fa-check"></i> Verdadero</button>
                    <button class="option-btn btn-falso" id="btnFalso"><i class="fas fa-times"></i> Falso</button>
                </div>
                <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
                <div class="result-message" id="resultMessage"></div>
                <button class="next-btn" id="nextBtn">Siguiente pregunta →</button>
            `;
            document.getElementById('btnVerdadero').addEventListener('click', () => responder(true));
            document.getElementById('btnFalso').addEventListener('click', () => responder(false));
            document.getElementById('nextBtn').addEventListener('click', siguientePregunta);
        }

        function guardarPuntuacion(puntos) {
            const stats = JSON.parse(localStorage.getItem('aprobadoya_minijuegos') || '{}');
            stats.totalJuegos = (stats.totalJuegos || 0) + 1;
            stats.totalPuntos = (stats.totalPuntos || 0) + puntos;
            localStorage.setItem('aprobadoya_minijuegos', JSON.stringify(stats));
        }

        function renderUserZone() {
            const u = getCurrentUser();
            const z = document.getElementById('userZone');
            if (u) z.innerHTML = `<div style="display:flex; align-items:center; gap:15px;"><span style="color:white;"><i class="fas fa-user-circle"></i> ${u.nombre}</span><a href="../perfil/index.html" class="btn-login" style="background:#fbbf24; color:#1a472a;">Mi perfil</a><button onclick="logoutUser()" class="btn-login" style="background:transparent; border:1px solid #fbbf24; color:#fbbf24;">Cerrar sesión</button></div>`;
            else z.innerHTML = `<a href="../login.html" class="btn-login"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</a>`;
        }

        renderUserZone();
        document.getElementById('btnVerdadero').addEventListener('click', () => responder(true));
        document.getElementById('btnFalso').addEventListener('click', () => responder(false));
        document.getElementById('nextBtn').addEventListener('click', siguientePregunta);
        iniciarJuego();
    </script>
</body>
</html>
