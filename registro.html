<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | AprobadoYa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .register-container { max-width: 450px; width: 100%; background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.2); animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .register-header { background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%); color: white; padding: 40px; text-align: center; }
        .register-header i { font-size: 3rem; margin-bottom: 15px; color: #fbbf24; }
        .register-header h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .register-body { padding: 40px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: #fbbf24; box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1); }
        .btn-register { width: 100%; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1a472a; border: none; padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(251, 191, 36, 0.4); }
        
        .google-btn {
            width: 100%;
            background: white;
            color: #333;
            border: 2px solid #e2e8f0;
            padding: 12px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }
        .google-btn:hover {
            background: #f8f9fa;
            border-color: #fbbf24;
            transform: translateY(-2px);
        }
        .google-btn i { font-size: 1.2rem; color: #4285f4; }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }
        
        .login-link { text-align: center; margin-top: 25px; color: #64748b; }
        .login-link a { color: #fbbf24; text-decoration: none; font-weight: 600; }
        .error-message { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 10px; margin-top: 15px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <i class="fas fa-user-plus"></i>
            <h1>AprobadoYa</h1>
            <p>Crea tu cuenta gratis</p>
        </div>
        <div class="register-body">
            <form id="registerForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nombre</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check-circle"></i> Confirmar contraseña</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-register">Registrarme</button>
                <div id="errorMessage" class="error-message"></div>
            </form>

            <div class="divider">O regístrate con</div>
            
            <button id="googleRegisterBtn" class="google-btn">
                <i class="fab fa-google"></i>
                Registrarme con Google
            </button>

            <div class="login-link">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/google-auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.style.display = 'none';
            
            if (password !== confirmPassword) {
                errorDiv.textContent = '❌ Las contraseñas no coinciden';
                errorDiv.style.display = 'block';
                return;
            }
            
            const result = registerUser(
                document.getElementById('nombre').value,
                document.getElementById('email').value,
                password
            );
            
            if (result.success) {
                window.location.href = 'login.html';
            } else {
                errorDiv.textContent = '❌ Error al registrar. El email puede existir.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
