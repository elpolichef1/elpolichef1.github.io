<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrera Multijugador | AprobadoYa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        h1 i { color: #fbbf24; margin-right: 10px; }
        .subtitle { color: #e0f0e8; margin-bottom: 30px; }
        .btn {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a472a;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(251,191,36,0.3); }
        .btn-outline {
            background: transparent;
            border: 2px solid #fbbf24;
            color: #fbbf24;
        }
        .btn-outline:hover { background: #fbbf24; color: #1a472a; }
        .codigo-container {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        .codigo-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .codigo-input input {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .codigo-input button {
            background: #fbbf24;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #94a3b8;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }
        .volver {
            display: inline-block;
            margin-top: 20px;
            color: #fbbf24;
            text-decoration: none;
        }
        
        /* Pantalla de espera */
        .waiting-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .waiting-card {
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(251,191,36,0.3);
        }
        .waiting-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        .waiting-codigo {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 20px;
            margin: 20px 0;
        }
        .waiting-codigo span {
            font-size: 2rem;
            letter-spacing: 5px;
            font-weight: bold;
            color: #fbbf24;
        }
        .btn-cancelar {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .waiting-text {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1><i class="fas fa-flag-checkered"></i> Carrera Multijugador</h1>
            <p class="subtitle">¡Compite contra otro jugador en tiempo real!</p>

            <button class="btn" id="btnAleatorio">
                <i class="fas fa-random"></i> Emparejamiento aleatorio
            </button>

            <div class="divider">o</div>

            <div class="codigo-container">
                <p><i class="fas fa-link"></i> Crear partida privada</p>
                <button class="btn-outline" id="btnCrearPartida" style="margin-top: 10px;">
                    <i class="fas fa-plus-circle"></i> Crear partida
                </button>
            </div>

            <div class="codigo-container">
                <p><i class="fas fa-door-open"></i> Unirse con código</p>
                <div class="codigo-input">
                    <input type="text" id="codigoInput" placeholder="Código de 6 dígitos" maxlength="6">
                    <button id="btnUnirse"><i class="fas fa-arrow-right"></i></button>
                </div>
            </div>

            <a href="../index.html" class="volver"><i class="fas fa-arrow-left"></i> Volver a juegos</a>
        </div>
    </div>

    <!-- Pantalla de espera -->
    <div id="waitingScreen" class="waiting-screen">
        <div class="waiting-card">
            <div class="waiting-spinner"></div>
            <h2><i class="fas fa-users"></i> Esperando oponente...</h2>
            <div class="waiting-codigo">
                <p>Código de la sala:</p>
                <span id="waitingCodigo">------</span>
            </div>
            <p class="waiting-text">Comparte este código con tu amigo para que se una</p>
            <button class="btn-cancelar" id="btnCancelarEspera">
                <i class="fas fa-times"></i> Cancelar
            </button>
        </div>
    </div>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, onSnapshot } from '../../js/firebase-init.js';
        import { renderUserZone } from '../../js/global-auth.js';
        
        let currentUser = null;
        let salaIdActual = null;
        let esperaInterval = null;
        
        function generarCodigo() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }
        
        function mostrarPantallaEspera(codigo) {
            const screen = document.getElementById('waitingScreen');
            document.getElementById('waitingCodigo').textContent = codigo;
            screen.style.display = 'flex';
        }
        
        function ocultarPantallaEspera() {
            const screen = document.getElementById('waitingScreen');
            screen.style.display = 'none';
        }
        
        function cancelarEspera() {
            if (esperaInterval) clearInterval(esperaInterval);
            if (salaIdActual) {
                // Eliminar la sala creada
                const salaRef = doc(db, "partidas_multijugador", salaIdActual);
                setDoc(salaRef, { estado: "cancelada" }).catch(console.error);
            }
            ocultarPantallaEspera();
            salaIdActual = null;
        }
        
        async function crearSalaEspera() {
            const codigo = generarCodigo();
            const salaId = `sala_${Date.now()}`;
            
            await setDoc(doc(db, "partidas_multijugador", salaId), {
                id: salaId,
                codigo: codigo,
                jugador1: currentUser.uid,
                jugador1Nombre: currentUser.displayName || currentUser.email.split('@')[0],
                jugador2: null,
                jugador2Nombre: null,
                estado: "esperando",
                creado: new Date().toISOString()
            });
            return { salaId, codigo };
        }
        
        async function buscarSalaAleatoria() {
            const salasRef = collection(db, "partidas_multijugador");
            const q = query(salasRef, where("estado", "==", "esperando"), where("jugador1", "!=", currentUser.uid));
            const snapshot = await getDocs(q);
            
            if (!snapshot.empty) {
                const sala = snapshot.docs[0];
                await updateDoc(sala.ref, {
                    jugador2: currentUser.uid,
                    jugador2Nombre: currentUser.displayName || currentUser.email.split('@')[0],
                    estado: "en_curso"
                });
                return sala.id;
            }
            return null;
        }
        
        async function unirsePorCodigo(codigo) {
            const salasRef = collection(db, "partidas_multijugador");
            const q = query(salasRef, where("codigo", "==", codigo), where("estado", "==", "esperando"));
            const snapshot = await getDocs(q);
            
            if (snapshot.empty) return null;
            
            const sala = snapshot.docs[0];
            await updateDoc(sala.ref, {
                jugador2: currentUser.uid,
                jugador2Nombre: currentUser.displayName || currentUser.email.split('@')[0],
                estado: "en_curso"
            });
            return sala.id;
        }
        
        async function esperarOponente(salaId) {
            mostrarPantallaEspera("---");
            salaIdActual = salaId;
            
            // Obtener el código para mostrarlo
            const salaRef = doc(db, "partidas_multijugador", salaId);
            const salaDoc = await getDoc(salaRef);
            if (salaDoc.exists()) {
                const codigo = salaDoc.data().codigo;
                document.getElementById('waitingCodigo').textContent = codigo;
            }
            
            // Escuchar cambios en la sala
            const unsubscribe = onSnapshot(salaRef, (doc) => {
                if (doc.exists()) {
                    const data = doc.data();
                    if (data.estado === "en_curso") {
                        unsubscribe();
                        if (esperaInterval) clearInterval(esperaInterval);
                        window.location.href = `juego-multijugador.html?sala=${salaId}`;
                    }
                }
            });
            
            // Timeout después de 60 segundos
            setTimeout(() => {
                unsubscribe();
                if (document.getElementById('waitingScreen').style.display === 'flex') {
                    alert("⏰ Tiempo de espera agotado. No se encontró ningún oponente.");
                    cancelarEspera();
                }
            }, 60000);
        }
        
        onAuthStateChanged(auth, async (user) => {
            renderUserZone();
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            currentUser = user;
            console.log("Usuario logueado:", currentUser.email);
        });
        
        document.getElementById('btnAleatorio').addEventListener('click', async () => {
            try {
                let salaId = await buscarSalaAleatoria();
                if (!salaId) {
                    const { salaId: nuevaSala, codigo } = await crearSalaEspera();
                    salaId = nuevaSala;
                    await esperarOponente(salaId);
                } else {
                    window.location.href = `juego-multijugador.html?sala=${salaId}`;
                }
            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            }
        });
        
        document.getElementById('btnCrearPartida').addEventListener('click', async () => {
            try {
                const { salaId, codigo } = await crearSalaEspera();
                await esperarOponente(salaId);
            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            }
        });
        
        document.getElementById('btnUnirse').addEventListener('click', async () => {
            const codigo = document.getElementById('codigoInput').value.trim();
            if (codigo.length !== 6) {
                alert("❌ Introduce un código de 6 dígitos");
                return;
            }
            
            try {
                const salaId = await unirsePorCodigo(codigo);
                if (salaId) {
                    window.location.href = `juego-multijugador.html?sala=${salaId}`;
                } else {
                    alert("❌ No se encontró ninguna partida con ese código");
                }
            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            }
        });
        
        document.getElementById('btnCancelarEspera').addEventListener('click', () => {
            cancelarEspera();
        });
    </script>
</body>
</html>
