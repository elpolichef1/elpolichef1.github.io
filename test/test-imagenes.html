<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Test con Imágenes | AprobadoYa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f5f3;
            color: #0f2b2d;
            line-height: 1.6;
        }
        header {
            background: #0a2f2a;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        header .container {
            max-width: 1300px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .logo i { font-size: 2rem; color: #f5b042; }
        .logo h1 { font-size: 1.5rem; font-weight: 800; color: white; }
        .logo span { color: #f5b042; }
        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }
        nav ul li a {
            text-decoration: none;
            color: #eef2f5;
            font-weight: 500;
            font-size: 0.9rem;
        }
        nav ul li a:hover, nav ul li a.active { color: #f5b042; }
        .user-zone { display: flex; align-items: center; }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 50px;
        }
        .user-avatar { font-size: 1.3rem; }
        .user-name { color: white; }
        .btn-profile, .btn-logout {
            background: #f5b042;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .btn-logout { background: #e2e8f0; }
        .btn-login {
            background: #f5b042;
            padding: 8px 20px;
            border-radius: 25px;
            color: #1a472a;
            text-decoration: none;
            font-weight: 600;
        }
        .menu-mobile {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
        }
        .page-header {
            background: linear-gradient(125deg, #0f3b2c 0%, #1b5a44 100%);
            padding: 40px 0;
            text-align: center;
            margin-bottom: 30px;
        }
        .page-header h1 { font-size: 2rem; color: white; }
        .page-header h1 i { color: #f5b042; margin-right: 10px; }
        .page-header p { color: #e0f0e8; margin-top: 8px; }
        
        .test-container {
            background: white;
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 15px;
        }
        .test-info {
            display: flex;
            gap: 20px;
        }
        .test-info-item {
            background: #f8fafc;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
        }
        .test-info-item i { color: #f5b042; margin-right: 5px; }
        .timer {
            background: #1e293b;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 700;
            font-family: monospace;
        }
        .timer.warning { background: #dc2626; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        .pregunta-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .pregunta-numero {
            display: inline-block;
            background: #f5b042;
            color: #1a472a;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .pregunta-texto {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
        }
        .pregunta-imagen {
            text-align: center;
            margin: 15px 0;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 16px;
        }
        .senal-img {
            max-width: 120px;
            max-height: 120px;
            border-radius: 8px;
            object-fit: contain;
        }
        .opciones {
            list-style: none;
            margin-top: 12px;
        }
        .opcion {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 15px;
            margin-bottom: 8px;
            background: white;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }
        .opcion:hover {
            background: #fef3c7;
            border-color: #f5b042;
        }
        .opcion input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #f5b042;
        }
        .explicacion {
            margin-top: 12px;
            padding: 12px;
            background: #fef3c7;
            border-radius: 14px;
            font-size: 0.8rem;
            color: #475569;
            display: none;
            border-left: 4px solid #f5b042;
        }
        .explicacion.mostrar { display: block; }
        .btn-enviar {
            background: linear-gradient(135deg, #f5b042, #f59e0b);
            color: #1a472a;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .resultado {
            margin-top: 25px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            display: none;
        }
        .resultado.exito { background: #d1fae5; color: #065f46; }
        .resultado.error { background: #fee2e2; color: #991b1b; }
        .resultado i { font-size: 2.5rem; margin-bottom: 10px; }
        .resultado-stats { display: flex; justify-content: center; gap: 25px; margin: 15px 0; }
        .btn-reiniciar {
            background: #f5b042;
            color: #1a472a;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        footer {
            background: #0f2a22;
            color: #cbdcd6;
            text-align: center;
            padding: 30px;
            margin-top: 30px;
        }
        @media (max-width: 768px) {
            .test-header { flex-direction: column; text-align: center; }
            .senal-img { max-width: 80px; }
            .menu-mobile { display: block; }
            .nav-wrapper { display: none; }
            .nav-wrapper.active { display: block; width: 100%; margin-top: 15px; }
            nav ul { flex-wrap: wrap; justify-content: center; gap: 15px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo" onclick="window.location.href='../index.html'">
                <i class="fas fa-check-circle"></i>
                <h1>Aprobado<span>Ya</span></h1>
            </div>
            <div class="nav-container">
                <div class="nav-wrapper" id="navWrapper">
                    <nav>
                        <ul>
                            <li><a href="../index.html">Inicio</a></li>
                            <li><a href="../temas/index.html">Temas</a></li>
                            <li><a href="test-imagenes.html" class="active">Test</a></li>
                            <li><a href="../simulacro/index.html">Simulacro</a></li>
                            <li><a href="../ranking/index.html">Ranking</a></li>
                            <li><a href="../mini-retos/index.html">🏎️ Mini Retos</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
            <div class="user-zone" id="userZone"></div>
            <button class="menu-mobile" id="menuMobileBtn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="page-header">
        <div class="container">
            <h1><i class="fas fa-image"></i> Test con Imágenes</h1>
            <p>10 preguntas con señales de tráfico reales</p>
        </div>
    </div>

    <main>
        <div class="container">
            <div class="test-container" id="testContainer">
                <div class="test-header">
                    <div class="test-info">
                        <div class="test-info-item"><i class="fas fa-question-circle"></i> Preguntas: <span id="totalPreguntas">0</span></div>
                        <div class="test-info-item"><i class="fas fa-check-circle"></i> Respondidas: <span id="respondidas">0</span></div>
                    </div>
                    <div class="timer" id="timer">10:00</div>
                </div>
                <div id="preguntasContainer"></div>
                <button class="btn-enviar" id="btnEnviar"><i class="fas fa-check-circle"></i> Finalizar test</button>
                <div id="resultado" class="resultado"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2025 AprobadoYa | Todos los derechos reservados</p>
        </div>
    </footer>

    <script type="module">
        import { auth, onAuthStateChanged } from '../js/firebase-init.js';
        import { renderUserZone } from '../js/global-auth.js';
        
        // ==================== PREGUNTAS CON IMÁGENES (IMÁGENES FUNCIONALES) ====================
        const preguntas = [
            {
                id: 1,
                texto: "¿Qué indica esta señal?",
                imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Spain_traffic_signal_r2.svg/200px-Spain_traffic_signal_r2.svg.png",
                opciones: ["STOP", "Ceda el paso", "Prohibido el paso", "Prioridad"],
                correcta: 1,
                explicacion: "La señal de CEDA EL PASO obliga a ceder el paso a los vehículos que circulan por la vía prioritaria."
            },
            {
                id: 2,
                texto: "¿Qué indica esta señal?",
                imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Spain_traffic_signal_r1.svg/200px-Spain_traffic_signal_r1.svg.png",
                opciones: ["Ceda el paso", "STOP", "Prohibido el paso", "Peligro"],
                correcta: 1,
                explicacion: "La señal de STOP obliga a detenerse completamente antes de continuar."
            },
            {
                id: 3,
                texto: "¿Qué indica esta señal?",
                imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Spain_traffic_signal_r301.svg/200px-Spain_traffic_signal_r301.svg.png",
                opciones: ["Velocidad máxima", "Velocidad mínima", "Fin de velocidad máxima", "Recomendación de velocidad"],
                correcta: 0,
                explicacion: "Indica la velocidad máxima permitida en km/h."
            },
            {
                id: 4,
                texto: "¿Qué indica esta señal?",
                imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Spain_traffic_signal_p1a.svg/200px-Spain_traffic_signal_p1a.svg.png",
                opciones: ["Curva peligrosa", "Intersección", "Ceda el paso", "Prohibido adelantar"],
                correcta: 0,
                explicacion: "Advierte de una curva peligrosa hacia la derecha."
            },
            {
                id: 5,
                texto: "¿Qué indica esta señal?",
                imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Spain_traffic_signal_p3.svg/200px-Spain_traffic_signal_p3.svg.png",
                opciones: ["Paso de peatones", "Prohibido el paso", "Zona escolar", "Peligro por niños"],
                correcta: 0,
                explicacion: "Indica la proximidad de un paso de peatones."
            },
            {
                id: 6,
                texto: "¿Qué indica esta señal?",
                imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Spain_traffic_signal_r101.svg/200px-Spain_traffic_signal_r101.svg.png",
                opciones: ["Prohibido adelantar", "Prohibido estacionar", "Prohibido girar", "Prohibido el paso"],
                correcta: 0,
                explicacion: "Prohíbe el adelantamiento a vehículos de más de 3.500 kg."
            },
            {
                id: 7,
                texto: "¿Qué indica esta señal?",
                imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Spain_traffic_signal_p20.svg/200px-Spain_traffic_signal_p20.svg.png",
                opciones: ["Semáforo", "Paso a nivel", "Peatones", "Obras"],
                correcta: 0,
                explicacion: "Advierte de la proximidad de un semáforo."
            },
            {
                id: 8,
                texto: "¿Qué indica esta señal?",
                imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Spain_traffic_signal_r400.svg/200px-Spain_traffic_signal_r400.svg.png",
                opciones: ["Prohibido estacionar", "Prohibido parar", "Zona de carga", "Estacionamiento regulado"],
                correcta: 0,
                explicacion: "Prohíbe el estacionamiento, pero permite paradas breves."
            },
            {
                id: 9,
                texto: "¿Qué indica esta señal?",
                imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/Spain_traffic_signal_p17.svg/200px-Spain_traffic_signal_p17.svg.png",
                opciones: ["Animales sueltos", "Ciclistas", "Peatones", "Obras"],
                correcta: 0,
                explicacion: "Advierte de peligro por posible presencia de animales sueltos."
            },
            {
                id: 10,
                texto: "¿Qué indica esta señal?",
                imagen: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Spain_traffic_signal_r305.svg/200px-Spain_traffic_signal_r305.svg.png",
                opciones: ["Fin de velocidad mínima", "Fin de velocidad máxima", "Fin de prohibición", "Fin de túnel"],
                correcta: 0,
                explicacion: "Indica el final de la velocidad mínima obligatoria."
            }
        ];

        let preguntasActuales = [];
        let respuestasUsuario = [];
        let tiempoRestante = 10 * 60;
        let timerInterval;
        let testActivo = true;
        
        function mezclarArray(array) {
            const mezclado = [...array];
            for (let i = mezclado.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [mezclado[i], mezclado[j]] = [mezclado[j], mezclado[i]];
            }
            return mezclado;
        }
        
        function iniciarTest() {
            preguntasActuales = mezclarArray(preguntas).slice(0, 10);
            respuestasUsuario = new Array(preguntasActuales.length).fill(null);
            
            document.getElementById('totalPreguntas').textContent = preguntasActuales.length;
            document.getElementById('respondidas').textContent = '0';
            
            iniciarTemporizador();
            renderizarPreguntas();
        }
        
        function iniciarTemporizador() {
            if (timerInterval) clearInterval(timerInterval);
            const timerElement = document.getElementById('timer');
            
            timerInterval = setInterval(() => {
                if (!testActivo) return;
                
                tiempoRestante--;
                const minutos = Math.floor(tiempoRestante / 60);
                const segundos = tiempoRestante % 60;
                timerElement.textContent = `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
                
                if (tiempoRestante <= 60) timerElement.classList.add('warning');
                if (tiempoRestante <= 0) {
                    clearInterval(timerInterval);
                    alert('⏰ ¡Se acabó el tiempo!');
                    finalizarTest();
                }
            }, 1000);
        }
        
        function renderizarPreguntas() {
            const container = document.getElementById('preguntasContainer');
            
            container.innerHTML = preguntasActuales.map((pregunta, idx) => `
                <div class="pregunta-card">
                    <div class="pregunta-numero">Pregunta ${idx + 1}</div>
                    <div class="pregunta-texto">${pregunta.texto}</div>
                    ${pregunta.imagen ? `
                        <div class="pregunta-imagen">
                            <img src="${pregunta.imagen}" alt="Señal de tráfico" class="senal-img" loading="lazy" onerror="this.parentElement.style.display='none'">
                        </div>
                    ` : ''}
                    <div class="opciones">
                        ${pregunta.opciones.map((opcion, optIdx) => `
                            <label class="opcion" data-pregunta="${idx}">
                                <input type="radio" name="pregunta_${idx}" value="${optIdx}" ${respuestasUsuario[idx] === optIdx ? 'checked' : ''}>
                                <span>${String.fromCharCode(65 + optIdx)}. ${opcion}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div class="explicacion" id="explicacion_${idx}">
                        <i class="fas fa-info-circle"></i> ${pregunta.explicacion}
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.opcion input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const preguntaIndex = parseInt(e.target.name.split('_')[1]);
                    const valor = parseInt(e.target.value);
                    respuestasUsuario[preguntaIndex] = valor;
                    const respondidas = respuestasUsuario.filter(r => r !== null).length;
                    document.getElementById('respondidas').textContent = respondidas;
                });
            });
        }
        
        function finalizarTest() {
            if (!testActivo) return;
            testActivo = false;
            if (timerInterval) clearInterval(timerInterval);
            
            let aciertos = 0;
            const total = preguntasActuales.length;
            
            preguntasActuales.forEach((pregunta, idx) => {
                const respuesta = respuestasUsuario[idx];
                const esCorrecto = (respuesta === pregunta.correcta);
                if (esCorrecto) aciertos++;
                
                const explicacionDiv = document.getElementById(`explicacion_${idx}`);
                if (explicacionDiv) explicacionDiv.classList.add('mostrar');
                
                const opciones = document.querySelectorAll(`.opcion[data-pregunta="${idx}"]`);
                opciones.forEach((opcion, optIdx) => {
                    const radio = opcion.querySelector('input');
                    radio.disabled = true;
                    if (optIdx === pregunta.correcta) {
                        opcion.style.background = '#d1fae5';
                        opcion.style.borderColor = '#10b981';
                    }
                    if (respuesta === optIdx && respuesta !== pregunta.correcta) {
                        opcion.style.background = '#fee2e2';
                        opcion.style.borderColor = '#dc2626';
                    }
                });
            });
            
            const porcentaje = Math.round((aciertos / total) * 100);
            const aprobado = porcentaje >= 90;
            const resultadoDiv = document.getElementById('resultado');
            
            resultadoDiv.className = `resultado ${aprobado ? 'exito' : 'error'}`;
            resultadoDiv.innerHTML = `
                <i class="fas ${aprobado ? 'fa-trophy' : 'fa-book-open'}"></i>
                <h3>${aprobado ? '🎉 ¡Enhorabuena! ¡Has aprobado! 🎉' : '📚 No has aprobado'}</h3>
                <div class="resultado-stats">
                    <div><strong>${aciertos}/${total}</strong> aciertos</div>
                    <div><strong>${porcentaje}%</strong> de aciertos</div>
                </div>
                <button class="btn-reiniciar" onclick="location.reload()">
                    <i class="fas fa-redo"></i> Nuevo test
                </button>
            `;
            resultadoDiv.style.display = 'block';
            document.getElementById('btnEnviar').style.display = 'none';
        }
        
        document.getElementById('btnEnviar').addEventListener('click', finalizarTest);
        
        onAuthStateChanged(auth, (user) => {
            renderUserZone();
            if (!user) {
                window.location.href = '../login.html';
            } else {
                iniciarTest();
            }
        });
        
        document.getElementById('menuMobileBtn')?.addEventListener('click', () => {
            document.querySelector('.nav-wrapper')?.classList.toggle('active');
        });
    </script>
</body>
</html>
