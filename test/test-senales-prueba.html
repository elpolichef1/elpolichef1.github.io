<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Test de Señales | AprobadoYa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f5f3 0%, #e0ece8 100%);
            min-height: 100vh;
            color: #0f2b2d;
        }
        header {
            background: #0a2f2a;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 28px;
        }
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 28px;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .logo i { font-size: 2rem; color: #f5b042; }
        .logo h1 { font-size: 1.7rem; font-weight: 800; color: white; }
        .logo span { color: #f5b042; }
        nav ul {
            display: flex;
            list-style: none;
            gap: 32px;
        }
        nav ul li a {
            text-decoration: none;
            color: #eef2f5;
            font-weight: 500;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        nav ul li a:hover, nav ul li a.active { color: #f5b042; }
        .user-zone { display: flex; align-items: center; }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255,255,255,0.12);
            padding: 6px 20px;
            border-radius: 60px;
        }
        .user-avatar { font-size: 1.6rem; }
        .user-name { color: white; font-weight: 500; }
        .btn-profile, .btn-logout {
            background: #f5b042;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            color: #0a2f2a;
        }
        .btn-logout { background: #e2e8f0; color: #1e293b; }
        .btn-login {
            background: #f5b042;
            padding: 8px 24px;
            border-radius: 40px;
            color: #0a2f2a;
            font-weight: 600;
            text-decoration: none;
        }
        .menu-mobile {
            display: none;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
        }
        
        .page-header {
            background: linear-gradient(125deg, #0f3b2c 0%, #1b5a44 100%);
            padding: 40px 0;
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .page-header h1 { font-size: 2rem; margin-bottom: 10px; }
        .page-header h1 i { color: #f5b042; margin-right: 12px; }
        
        .test-container {
            background: white;
            border-radius: 30px;
            padding: 35px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 15px;
        }
        .test-info { display: flex; gap: 20px; }
        .test-info-item {
            background: #f8fafc;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .pregunta-card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }
        .pregunta-card.correcta { border-left: 4px solid #10b981; background: #f0fdf4; }
        .pregunta-card.incorrecta { border-left: 4px solid #ef4444; background: #fef2f2; }
        .pregunta-numero {
            font-size: 0.8rem;
            color: #f5b042;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .pregunta-texto {
            font-weight: 600;
            margin-bottom: 18px;
            color: #1e293b;
            font-size: 1rem;
        }
        .senal-imagen {
            text-align: center;
            margin: 15px 0;
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }
        .senal-imagen img {
            max-width: 150px;
            max-height: 150px;
            object-fit: contain;
        }
        .opciones {
            display: grid;
            gap: 10px;
            margin-top: 15px;
        }
        .opcion {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .opcion:hover:not(.disabled) {
            background: #fef3c7;
            border-color: #fbbf24;
            transform: translateX(5px);
        }
        .opcion.disabled { cursor: not-allowed; opacity: 0.7; }
        .opcion.correcta-respuesta { background: #d1fae5; border-color: #10b981; }
        .opcion.incorrecta-respuesta { background: #fee2e2; border-color: #ef4444; }
        
        .btn-enviar {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a472a;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn-enviar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(251,191,36,0.3); }
        
        .resultado {
            margin-top: 25px;
            padding: 25px;
            border-radius: 20px;
            display: none;
            text-align: center;
        }
        .resultado.exito { background: #d1fae5; color: #065f46; }
        .resultado.error { background: #fee2e2; color: #991b1b; }
        .puntuacion-final { font-size: 2.5rem; font-weight: 800; margin: 15px 0; }
        
        .volver {
            display: inline-block;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
        }
        .volver:hover { color: #f5b042; }
        
        @media (max-width: 768px) {
            .test-container { padding: 20px; }
            .senal-imagen img { max-width: 100px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo" onclick="window.location.href='../index.html'">
                <i class="fas fa-check-circle"></i>
                <h1>Aprobado<span>Ya</span></h1>
            </div>
            <div class="nav-container">
                <div class="nav-wrapper" id="navWrapper">
                    <nav>
                        <ul>
                            <li><a href="../index.html">Inicio</a></li>
                            <li><a href="../temas/index.html">Temas</a></li>
                            <li><a href="index.html" class="active">Test</a></li>
                            <li><a href="../simulacro/index.html">Simulacro</a></li>
                            <li><a href="../ranking/index.html">Ranking</a></li>
                            <li><a href="../mini-retos/index.html">🏎️ Mini Retos</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
            <div class="user-zone" id="userZone"></div>
            <button class="menu-mobile" id="menuMobileBtn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="page-header">
        <div class="container">
            <h1><i class="fas fa-traffic-light"></i> Test de Señales</h1>
            <p>Prueba de 8 señales de tráfico</p>
        </div>
    </div>

    <main>
        <div class="container">
            <div class="test-container">
                <div class="test-header">
                    <div class="test-info">
                        <div class="test-info-item"><i class="fas fa-question-circle"></i> Preguntas: <span id="totalPreguntas">8</span></div>
                        <div class="test-info-item"><i class="fas fa-check-circle"></i> Respondidas: <span id="respondidas">0</span></div>
                    </div>
                </div>
                <div id="preguntasContainer"></div>
                <button class="btn-enviar" id="btnEnviar">Finalizar test</button>
                <div id="resultado" class="resultado"></div>
                <a href="index.html" class="volver"><i class="fas fa-arrow-left"></i> Volver a tests</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>© 2025 AprobadoYa | Todos los derechos reservados</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { auth, onAuthStateChanged } from '../js/firebase-init.js';
        import { renderUserZone } from '../js/global-auth.js';
        
        // ==================== PREGUNTAS CON IMÁGENES ====================
        const preguntas = [
            {
                id: 1,
                texto: "¿Qué indica esta señal?",
                imagen: "../img/entrada-prohibida-a vehículos-de motor.png",
                opciones: ["Prohibido el paso a vehículos de motor", "Prohibido el paso a camiones", "Prohibido el paso a motos", "Prohibido el paso a ciclomotores"],
                correcta: 0,
                explicacion: "Prohíbe la entrada a todo vehículo de motor."
            },
            {
                id: 2,
                texto: "¿Qué indica esta señal?",
                imagen: "../img/giro-obligatorio-a-la-derecha.png",
                opciones: ["Giro obligatorio a la derecha", "Prohibido girar a la derecha", "Dirección recomendada", "Carril obligatorio"],
                correcta: 0,
                explicacion: "Indica que hay que girar obligatoriamente a la derecha."
            },
            {
                id: 3,
                texto: "¿Qué indica esta señal?",
                imagen: "../img/Parking.png",
                opciones: ["Estacionamiento", "Prohibido estacionar", "Parada de autobús", "Zona de carga"],
                correcta: 0,
                explicacion: "Indica zona de estacionamiento permitido."
            },
            {
                id: 4,
                texto: "¿Qué indica esta señal?",
                imagen: "../img/Prohibido-adelantar.png",
                opciones: ["Prohibido adelantar", "Prohibido circular", "Fin de prohibición de adelantar", "Prohibido cambiar de carril"],
                correcta: 0,
                explicacion: "Prohíbe adelantar a cualquier vehículo en ese tramo."
            },
            {
                id: 5,
                texto: "¿Qué indica esta señal?",
                imagen: "../img/niños.png",
                opciones: ["Prohibido el paso a peatones", "Paso de peatones", "Zona peatonal", "Prohibido el paso a bicicletas"],
                correcta: 0,
                explicacion: "Prohíbe el paso a peatones."
            },
            {
                id: 6,
                texto: "¿Qué indica esta señal?",
                imagen: "../img/Prohibido-el-paso.png",
                opciones: ["Prohibido el paso", "Prohibido adelantar", "Prohibido estacionar", "Prohibido girar"],
                correcta: 0,
                explicacion: "Prohíbe la entrada a vehículos en ese sentido."
            },
            {
                id: 7,
                texto: "¿Qué indica esta señal?",
                imagen: "../img/Prohibido-girar-a-la-derecha.png",
                opciones: ["Prohibido girar a la derecha", "Prohibido girar a la izquierda", "Prohibido cambiar de sentido", "Prohibido circular"],
                correcta: 0,
                explicacion: "Prohíbe girar a la derecha."
            },
            {
                id: 8,
                texto: "¿Qué indica esta señal?",
                imagen: "../img/stop.png",
                opciones: ["STOP - Detención obligatoria", "Ceda el paso", "Prohibido el paso", "Prioridad"],
                correcta: 0,
                explicacion: "La señal de STOP obliga a detenerse completamente antes de continuar."
            }
        ];

        let preguntasActuales = [];
        let respuestasUsuario = [];
        let testFinalizado = false;
        let currentUser = null;
        
        function mezclarArray(array) {
            const mezclado = [...array];
            for (let i = mezclado.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [mezclado[i], mezclado[j]] = [mezclado[j], mezclado[i]];
            }
            return mezclado;
        }
        
        function iniciarTest() {
            preguntasActuales = mezclarArray(preguntas);
            respuestasUsuario = new Array(preguntasActuales.length).fill(null);
            
            document.getElementById('totalPreguntas').textContent = preguntasActuales.length;
            document.getElementById('respondidas').textContent = '0';
            
            renderizarPreguntas();
            testFinalizado = false;
        }
        
        function renderizarPreguntas() {
            const container = document.getElementById('preguntasContainer');
            
            container.innerHTML = preguntasActuales.map((pregunta, idx) => `
                <div class="pregunta-card" data-id="${idx}">
                    <div class="pregunta-numero">Pregunta ${idx + 1}</div>
                    <div class="pregunta-texto">${pregunta.texto}</div>
                    <div class="senal-imagen">
                        <img src="${pregunta.imagen}" alt="Señal de tráfico" onerror="this.src='https://placehold.co/150x150/f0f0f0/cccccc?text=Se%C3%B1al'">
                    </div>
                    <div class="opciones" id="opciones_${idx}">
                        ${pregunta.opciones.map((opcion, optIdx) => `
                            <label class="opcion" data-pregunta="${idx}" data-opcion="${optIdx}">
                                <input type="radio" name="pregunta_${idx}" value="${optIdx}" ${respuestasUsuario[idx] === optIdx ? 'checked' : ''}>
                                <span>${String.fromCharCode(65 + optIdx)}. ${opcion}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div class="explicacion" id="explicacion_${idx}" style="display: none; margin-top: 12px; padding: 12px; background: #f1f5f9; border-radius: 12px; font-size: 0.8rem;">
                        <i class="fas fa-info-circle"></i> ${pregunta.explicacion}
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.opcion input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const preguntaIndex = parseInt(e.target.name.split('_')[1]);
                    const valor = parseInt(e.target.value);
                    respuestasUsuario[preguntaIndex] = valor;
                    const respondidas = respuestasUsuario.filter(r => r !== null).length;
                    document.getElementById('respondidas').textContent = respondidas;
                });
            });
        }
        
        function mostrarToast(mensaje) {
            const toast = document.createElement('div');
            toast.innerHTML = `<div style="position:fixed; bottom:20px; right:20px; background:#10b981; color:white; padding:12px 24px; border-radius:50px; z-index:9999; font-weight:bold; box-shadow:0 4px 15px rgba(0,0,0,0.2);"><i class="fas fa-check-circle"></i> ${mensaje}</div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function finalizarTest() {
            if (testFinalizado) return;
            testFinalizado = true;
            
            let aciertos = 0;
            const total = preguntasActuales.length;
            
            preguntasActuales.forEach((pregunta, idx) => {
                const respuesta = respuestasUsuario[idx];
                const esCorrecto = (respuesta === pregunta.correcta);
                if (esCorrecto) aciertos++;
                
                const preguntaDiv = document.querySelector(`.pregunta-card[data-id="${idx}"]`);
                if (preguntaDiv) {
                    preguntaDiv.classList.add(esCorrecto ? 'correcta' : 'incorrecta');
                }
                
                const opciones = document.querySelectorAll(`#opciones_${idx} .opcion`);
                opciones.forEach((opcion, optIdx) => {
                    opcion.classList.add('disabled');
                    if (optIdx === pregunta.correcta) {
                        opcion.classList.add('correcta-respuesta');
                    }
                    if (respuesta === optIdx && respuesta !== pregunta.correcta) {
                        opcion.classList.add('incorrecta-respuesta');
                    }
                });
                
                // Mostrar explicación
                const explicacionDiv = document.getElementById(`explicacion_${idx}`);
                if (explicacionDiv) {
                    explicacionDiv.style.display = 'block';
                }
            });
            
            const porcentaje = Math.round((aciertos / total) * 100);
            const aprobado = porcentaje >= 70;
            const resultadoDiv = document.getElementById('resultado');
            
            resultadoDiv.className = `resultado ${aprobado ? 'exito' : 'error'}`;
            resultadoDiv.innerHTML = `
                <i class="fas ${aprobado ? 'fa-trophy' : 'fa-book-open'}" style="font-size: 2.5rem;"></i>
                <h3>${aprobado ? '🎉 ¡Enhorabuena! ¡Has aprobado! 🎉' : '📚 No has aprobado'}</h3>
                <div class="puntuacion-final">${porcentaje}%</div>
                <p>Has acertado <strong>${aciertos}</strong> de <strong>${total}</strong> preguntas</p>
                <button onclick="location.reload()" style="background: #fbbf24; color: #1a472a; border: none; padding: 10px 20px; border-radius: 50px; margin-top: 15px; cursor: pointer;">
                    <i class="fas fa-redo"></i> Nuevo test
                </button>
            `;
            resultadoDiv.style.display = 'block';
            document.getElementById('btnEnviar').style.display = 'none';
            
            // Guardar estadísticas en localStorage
            const stats = JSON.parse(localStorage.getItem('aprobadoya_test_stats') || '{}');
            stats.totalTests = (stats.totalTests || 0) + 1;
            stats.totalAciertos = (stats.totalAciertos || 0) + aciertos;
            stats.totalPreguntas = (stats.totalPreguntas || 0) + total;
            stats.mejorResultado = Math.max(stats.mejorResultado || 0, porcentaje);
            stats.tasaAciertos = Math.round((stats.totalAciertos / stats.totalPreguntas) * 100);
            if (aprobado) stats.testsAprobados = (stats.testsAprobados || 0) + 1;
            localStorage.setItem('aprobadoya_test_stats', JSON.stringify(stats));
        }
        
        document.getElementById('btnEnviar').addEventListener('click', () => {
            const respondidas = respuestasUsuario.filter(r => r !== null).length;
            if (respondidas < preguntasActuales.length) {
                if (confirm(`⚠️ Solo has respondido ${respondidas} de ${preguntasActuales.length} preguntas.\n¿Seguro que quieres finalizar?`)) {
                    finalizarTest();
                }
            } else {
                if (confirm('¿Seguro que quieres finalizar el test?')) {
                    finalizarTest();
                }
            }
        });
        
        onAuthStateChanged(auth, (user) => {
            renderUserZone();
            if (!user) {
                window.location.href = '../login.html';
            } else {
                currentUser = user;
                iniciarTest();
            }
        });
        
        document.getElementById('menuMobileBtn')?.addEventListener('click', () => {
            const wrapper = document.getElementById('navWrapper');
            if (wrapper) wrapper.classList.toggle('active');
        });
    </script>
</body>
</html>
