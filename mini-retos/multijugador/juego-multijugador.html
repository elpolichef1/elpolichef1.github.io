<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Carrera Multijugador | AprobadoYa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .game-header { text-align: center; margin-bottom: 30px; }
        .game-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #fff, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
.game-header h1 i { 
    color: #fbbf24; 
}        
        .race-track {
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(4px);
            border-radius: 35px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        .track {
            position: relative;
            height: 90px;
            background: #3a4a30;
            border-radius: 50px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }
        .track:last-child { margin-bottom: 0; }
        .car {
            position: absolute;
            bottom: 12px;
            left: 0%;
            font-size: 2.2rem;
            transition: left 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .finish-line {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 35px;
            background: repeating-linear-gradient(90deg, #000 0px, #000 12px, #fff 12px, #fff 24px);
            border-radius: 0 50px 50px 0;
        }
        .player-name {
            position: absolute;
            top: -28px;
            left: 15px;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.7);
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 500;
        }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 18px 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(251,191,36,0.15);
        }
        .score-item { text-align: center; flex: 1; }
        .score-value { font-size: 1.6rem; font-weight: 800; color: #fbbf24; }
        .score-label { font-size: 0.7rem; opacity: 0.8; margin-top: 4px; }
        
        .question-card {
            background: white;
            border-radius: 35px;
            padding: 30px;
            color: #1e293b;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 25px;
            line-height: 1.5;
            color: #1a472a;
        }
        .options { display: grid; gap: 12px; }
        .option-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .option-btn:hover:not(.disabled) {
            background: #fef3c7;
            border-color: #fbbf24;
            transform: translateX(8px);
        }
        .option-prefix {
            font-weight: 800;
            color: #fbbf24;
            width: 35px;
            font-size: 1.1rem;
        }
        .disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .correct { background: #d1fae5; border-color: #10b981; }
        .incorrect { background: #fee2e2; border-color: #ef4444; }
        
        .turn-indicator {
            text-align: center;
            padding: 12px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a472a;
            border-radius: 60px;
            margin-bottom: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .waiting-message {
            text-align: center;
            padding: 60px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            border-radius: 40px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .resultado-final {
            text-align: center;
            padding: 40px;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            backdrop-filter: blur(8px);
        }
        .resultado-final i { font-size: 4rem; margin-bottom: 15px; }
        .resultado-final h2 { margin-bottom: 20px; }
        .btn-reintentar {
            background: #fbbf24;
            color: #1a472a;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-reintentar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(251,191,36,0.4); }
        
        @media (max-width: 768px) {
            .car { font-size: 1.8rem; bottom: 10px; }
            .track { height: 75px; }
            .question-text { font-size: 1rem; }
            .score-value { font-size: 1.2rem; }
            .option-btn { padding: 10px 15px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1><i class="fas fa-flag-checkered"></i> Carrera Multijugador</h1>
        </div>
        <div id="gameContent">
            <div class="waiting-message">
                <div class="spinner"></div>
                <p>Cargando partida...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, getDoc, updateDoc, onSnapshot } from '../../js/firebase-init.js';
        import { renderUserZone } from '../../js/global-auth.js';
        import { preguntasDGT } from '../../test/data/preguntas.js';
        
        let salaId = null;
        let currentUser = null;
        let salaData = null;
        let esJugador1 = false;
        let respuestaSeleccionada = false;
        let gameActivo = true;
        let unsubscribe = null;
        
        function obtenerPreguntaAleatoria() {
            return preguntasDGT[Math.floor(Math.random() * preguntasDGT.length)];
        }
        
        async function iniciarPartida() {
            const preguntas = [];
            for (let i = 0; i < 7; i++) {
                preguntas.push(obtenerPreguntaAleatoria());
            }
            await updateDoc(doc(db, "partidas_multijugador", salaId), {
                preguntas: preguntas,
                turno: 0,
                puntuacion1: 0,
                puntuacion2: 0
            });
        }
        
        async function responder(respuesta) {
            if (!gameActivo || respuestaSeleccionada) return;
            if (salaData.turno !== (esJugador1 ? 0 : 1)) {
                alert("Espera tu turno!");
                return;
            }
            
            respuestaSeleccionada = true;
            const pregunta = salaData.preguntas[salaData.turno];
            const esCorrecto = (respuesta === pregunta.correcta);
            
            // Mostrar feedback visual
            const opciones = document.querySelectorAll('.option-btn');
            opciones.forEach((btn, idx) => {
                btn.classList.add('disabled');
                if (idx === pregunta.correcta) btn.classList.add('correct');
                if (idx === respuesta && respuesta !== pregunta.correcta) btn.classList.add('incorrect');
            });
            
            const nuevaPuntuacion1 = salaData.puntuacion1 + (esJugador1 && esCorrecto ? 1 : 0);
            const nuevaPuntuacion2 = salaData.puntuacion2 + (!esJugador1 && esCorrecto ? 1 : 0);
            const nuevoTurno = salaData.turno + 1;
            
            await updateDoc(doc(db, "partidas_multijugador", salaId), {
                puntuacion1: nuevaPuntuacion1,
                puntuacion2: nuevaPuntuacion2,
                turno: nuevoTurno
            });
            
            if (nuevoTurno >= salaData.preguntas.length) {
                setTimeout(() => finalizarJuego(), 1500);
            }
        }
        
        function renderizarJuego() {
            const puntos1 = salaData.puntuacion1 || 0;
            const puntos2 = salaData.puntuacion2 || 0;
            const total = salaData.preguntas.length;
            const turno = salaData.turno;
            
            if (turno >= total) {
                finalizarJuego();
                return;
            }
            
            const pregunta = salaData.preguntas[turno];
            const esMiTurno = (turno === (esJugador1 ? 0 : 1));
            const avance1 = (puntos1 / total) * 100;
            const avance2 = (puntos2 / total) * 100;
            
            document.getElementById('gameContent').innerHTML = `
                <div class="race-track">
                    <div class="track">
                        <div class="player-name">🏎️ ${escapeHtml(salaData.jugador1Nombre)}</div>
                        <div class="car" style="left: ${Math.min(avance1, 96)}%">🏎️</div>
                        <div class="finish-line"></div>
                    </div>
                    <div class="track">
                        <div class="player-name">🏎️ ${escapeHtml(salaData.jugador2Nombre)}</div>
                        <div class="car" style="left: ${Math.min(avance2, 96)}%">🏎️</div>
                        <div class="finish-line"></div>
                    </div>
                </div>
                <div class="score-board">
                    <div class="score-item"><div class="score-value">${puntos1}</div><div class="score-label">${escapeHtml(salaData.jugador1Nombre)}</div></div>
                    <div class="score-item"><div class="score-value">${turno + 1}/${total}</div><div class="score-label">📝 Pregunta</div></div>
                    <div class="score-item"><div class="score-value">${puntos2}</div><div class="score-label">${escapeHtml(salaData.jugador2Nombre)}</div></div>
                </div>
                ${!esMiTurno ? `<div class="turn-indicator"><i class="fas fa-hourglass-half"></i> Esperando respuesta del oponente...</div>` : ''}
                <div class="question-card">
                    <div class="question-text">${escapeHtml(pregunta.texto)}</div>
                    <div class="options" id="optionsContainer">
                        ${pregunta.opciones.map((opt, idx) => `
                            <div class="option-btn" data-opcion="${idx}">
                                <span class="option-prefix">${String.fromCharCode(65+idx)}.</span>
                                <span>${escapeHtml(opt)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            if (esMiTurno && gameActivo) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (!respuestaSeleccionada && gameActivo) {
                            responder(parseInt(btn.dataset.opcion));
                        }
                    });
                });
            } else if (!esMiTurno) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.classList.add('disabled');
                });
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function finalizarJuego() {
            gameActivo = false;
            const p1 = salaData.puntuacion1 || 0;
            const p2 = salaData.puntuacion2 || 0;
            const ganador = p1 > p2 ? salaData.jugador1Nombre : (p2 > p1 ? salaData.jugador2Nombre : "Empate");
            const esGanador = (p1 > p2 && esJugador1) || (p2 > p1 && !esJugador1);
            
            document.getElementById('gameContent').innerHTML = `
                <div class="resultado-final">
                    <i class="fas ${esGanador ? 'fa-trophy' : 'fa-flag-checkered'}" style="color: #fbbf24;"></i>
                    <h2>🏁 ¡PARTIDA FINALIZADA! 🏁</h2>
                    <div style="background: rgba(0,0,0,0.3); border-radius: 25px; padding: 20px; margin: 20px 0;">
                        <p style="margin: 8px 0;"><strong>${escapeHtml(salaData.jugador1Nombre)}</strong>: ${p1} puntos</p>
                        <p style="margin: 8px 0;"><strong>${escapeHtml(salaData.jugador2Nombre)}</strong>: ${p2} puntos</p>
                        <div style="height: 2px; background: rgba(255,255,255,0.2); margin: 15px 0;"></div>
                        <h3 style="color: #fbbf24;">${ganador === "Empate" ? "🤝 ¡EMPATE! 🤝" : (esGanador ? "🎉 ¡HAS GANADO! 🎉" : `🏆 ¡HA GANADO ${ganador}! 🏆`)}</h3>
                    </div>
                    <button class="btn-reintentar" onclick="window.location.href='lobby.html'"><i class="fas fa-redo"></i> Jugar de nuevo</button>
                    <a href="../index.html" style="display: inline-block; margin-left: 15px; background: rgba(255,255,255,0.2); color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none;">Volver al menú</a>
                </div>
            `;
            
            const stats = JSON.parse(localStorage.getItem('aprobadoya_minijuegos') || '{}');
            stats.totalJuegos = (stats.totalJuegos || 0) + 1;
            stats.totalPuntos = (stats.totalPuntos || 0) + (esGanador ? 100 : 50);
            localStorage.setItem('aprobadoya_minijuegos', JSON.stringify(stats));
            
            if (unsubscribe) unsubscribe();
        }
        
        async function cargarPartida() {
            const salaRef = doc(db, "partidas_multijugador", salaId);
            const salaDoc = await getDoc(salaRef);
            if (!salaDoc.exists()) {
                window.location.href = 'lobby.html';
                return;
            }
            salaData = salaDoc.data();
            esJugador1 = salaData.jugador1 === currentUser.uid;
            
            if (salaData.estado === "esperando") {
                document.getElementById('gameContent').innerHTML = `<div class="waiting-message"><div class="spinner"></div><p>⏳ Esperando oponente...</p></div>`;
            } else if (salaData.estado === "en_curso") {
                if (!salaData.preguntas) await iniciarPartida();
                renderizarJuego();
            }
            
            unsubscribe = onSnapshot(salaRef, (doc) => {
                if (doc.exists()) {
                    salaData = doc.data();
                    if (salaData.estado === "en_curso" && salaData.preguntas && gameActivo) {
                        renderizarJuego();
                    }
                }
            });
        }
        
        onAuthStateChanged(auth, async (user) => {
            renderUserZone();
            if (!user) { window.location.href = '../../login.html'; return; }
            currentUser = user;
            const urlParams = new URLSearchParams(window.location.search);
            salaId = urlParams.get('sala');
            if (!salaId) { window.location.href = 'lobby.html'; return; }
            await cargarPartida();
        });
    </script>
</body>
</html>
