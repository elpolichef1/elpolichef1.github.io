<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esperando oponente | Carrera Multijugador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0f2a1a 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { max-width: 500px; width: 90%; margin: 20px; text-align: center; }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 50px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .codigo-box {
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
        }
        .codigo {
            font-size: 2rem;
            letter-spacing: 8px;
            color: #fbbf24;
            font-weight: bold;
        }
        .btn-cancelar {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-cancelar:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <i class="fas fa-users" style="font-size: 3rem; color: #fbbf24;"></i>
            <h2 style="margin: 15px 0;">Esperando oponente...</h2>
            <div class="spinner"></div>
            <div class="codigo-box">
                <p>Código de la sala:</p>
                <div class="codigo" id="codigoDisplay">------</div>
            </div>
            <p>Comparte este código con tu amigo</p>
            <button class="btn-cancelar" id="btnCancelar">
                <i class="fas fa-times"></i> Cancelar
            </button>
        </div>
    </div>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, onSnapshot } from '../../js/firebase-init.js';
        import { renderUserZone } from '../../js/global-auth.js';
        
        let salaId = null;
        let unsubscribe = null;
        
        onAuthStateChanged(auth, (user) => {
            renderUserZone();
            if (!user) { window.location.href = '../../login.html'; return; }
        });
        
        const urlParams = new URLSearchParams(window.location.search);
        salaId = urlParams.get('sala');
        const codigo = urlParams.get('codigo');
        
        if (codigo) {
            document.getElementById('codigoDisplay').textContent = codigo;
        }
        
        if (salaId) {
            const salaRef = doc(db, "partidas_multijugador", salaId);
            unsubscribe = onSnapshot(salaRef, (doc) => {
                if (doc.exists() && doc.data().estado === "en_curso") {
                    if (unsubscribe) unsubscribe();
                    window.location.href = `juego.html?sala=${salaId}`;
                }
            });
        }
        
        document.getElementById('btnCancelar').addEventListener('click', () => {
            if (unsubscribe) unsubscribe();
            window.location.href = 'lobby.html';
        });
    </script>
</body>
</html>
